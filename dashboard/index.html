<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>orchestrator@magascii: tail -f workflows</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── Magascii CRT amber-on-black theme ─────────────────────────────── */
  :root {
    --bg:        #0a0806;
    --screen:    #0e0b07;
    --amber:     #f5a30b;
    --amber-dim: #9c6405;
    --amber-soft:rgba(245, 163, 11, 0.08);
    --amber-glow:rgba(245, 163, 11, 0.55);
    --muted:     #7a6a4a;
    --line:      rgba(245, 163, 11, 0.20);
    --line-soft: rgba(245, 163, 11, 0.08);
    --text:      #e8d9b0;
    --text-dim:  #b8a57a;
    --ok:        #7ad67a;
    --warn:      #ffb648;
    --err:       #ff5555;
    --blue:      #88b6ff;
    --font:      'Fira Code', 'Share Tech Mono', 'VT323', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #000;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.45;
    overflow: hidden;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, var(--bg) 0%, #000 85%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none; z-index: 9999;
    background: repeating-linear-gradient(0deg,
      rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.22) 3px, rgba(0,0,0,0.22) 4px);
    mix-blend-mode: multiply;
  }

  /* ── Terminal frame ────────────────────────────────────────────────── */
  .term {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex; flex-direction: column;
    background: var(--screen);
    box-shadow:
      inset 0 0 180px rgba(0,0,0,0.85),
      inset 0 0 30px rgba(245,163,11,0.08);
    border: 1px solid var(--amber-dim);
    overflow: hidden;
  }
  .term-chrome {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    background: linear-gradient(180deg, #1a1308, #0e0b07);
    border-bottom: 1px solid var(--amber-dim);
    color: var(--amber);
    font-size: 12px;
  }
  .term-dot {
    width: 12px; height: 12px; border-radius: 50%;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.6);
  }
  .term-dot.r { background: #ff5f56; }
  .term-dot.y { background: #ffbd2e; }
  .term-dot.g { background: #27c93f; }
  .term-title {
    flex: 1; text-align: center;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    font-size: 12px;
  }
  .term-clock {
    color: var(--amber);
    font-size: 12px; letter-spacing: 1px;
    text-shadow: 0 0 6px var(--amber-glow);
    min-width: 80px; text-align: right;
  }

  .term-screen {
    flex: 1; min-height: 0;
    padding: 14px 22px 18px;
    overflow-y: auto;
    color: var(--text);
    text-shadow: 0 0 1px rgba(245,163,11,0.30);
  }
  .term-screen::-webkit-scrollbar { width: 10px; }
  .term-screen::-webkit-scrollbar-track { background: #0a0806; }
  .term-screen::-webkit-scrollbar-thumb { background: var(--amber-dim); }
  .term-screen::-webkit-scrollbar-thumb:hover { background: var(--amber); }

  /* ── Banner / prompt ───────────────────────────────────────────────── */
  .banner-sub {
    color: var(--text-dim);
    font-size: 11.5px; letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .banner-sub .host { color: var(--amber); text-shadow: 0 0 4px var(--amber-glow); }

  .stats-strip {
    display: flex; flex-wrap: wrap; gap: 14px;
    padding: 8px 0 6px;
    margin-bottom: 6px;
    font-size: 11.5px;
    color: var(--muted);
    letter-spacing: 0.4px;
    border-bottom: 1px dashed var(--line);
  }
  .stats-strip .stat em {
    font-style: normal; color: var(--amber);
    text-shadow: 0 0 4px var(--amber-glow);
    font-weight: 600;
  }
  .stats-strip .stat.warn em { color: var(--warn); }
  .stats-strip .stat.err  em { color: var(--err); }
  .stats-strip .stat.ok   em { color: var(--ok); }
  .stats-strip .stat.run  em { color: var(--blue); }
  .stats-strip .live {
    margin-left: auto; color: var(--ok);
    animation: blink 1.5s step-end infinite;
  }
  .stats-strip .live.off { color: var(--muted); animation: none; }
  @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0.3; } }

  .prompt-line {
    display: flex; gap: 10px; align-items: baseline;
    padding: 6px 0;
    font-size: 13px;
  }
  .ps1 { color: var(--ok); font-weight: 600; white-space: nowrap; }
  .cmd { color: var(--text); }
  .caret {
    color: var(--amber);
    animation: caretBlink 1.1s step-end infinite;
    margin-left: 2px;
  }
  @keyframes caretBlink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }

  /* ── Tabs (pills, terminal-flag style) ─────────────────────────────── */
  .pills {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 8px 0 12px;
    border-bottom: 1px dashed var(--line);
    margin-bottom: 12px;
  }
  .pill {
    background: transparent;
    color: var(--amber-dim);
    border: 1px solid var(--line);
    font-family: var(--font);
    font-size: 11.5px;
    padding: 3px 10px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .pill:hover { border-color: var(--amber); color: var(--amber); }
  .pill.active {
    border-color: var(--ok);
    color: var(--ok);
    text-shadow: 0 0 4px rgba(122,214,122,0.5);
  }
  .pill.danger { color: var(--err); border-color: rgba(255,85,85,0.35); }
  .pill.danger:hover { border-color: var(--err); color: var(--err); }

  /* ── Section headings ──────────────────────────────────────────────── */
  .section-head {
    color: var(--amber);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 0 6px;
    border-top: 1px dashed var(--line-soft);
    margin-top: 12px;
    font-size: 11.5px;
    text-shadow: 0 0 4px var(--amber-glow);
  }
  .section-head:first-child { border-top: none; margin-top: 0; padding-top: 4px; }

  /* ── Banner setup (first run) ──────────────────────────────────────── */
  .banner-box {
    border: 1px solid var(--amber-dim);
    background: var(--amber-soft);
    padding: 10px 14px;
    margin-bottom: 14px;
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
  }
  .banner-box h3 {
    color: var(--amber);
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 600;
    text-shadow: 0 0 4px var(--amber-glow);
  }
  .banner-box .hints {
    font-size: 11.5px; color: var(--text-dim); line-height: 1.5;
    flex: 1; min-width: 240px;
  }
  .banner-box .hints ul { margin: 4px 0 0 18px; padding: 0; }

  /* ── Forms / buttons ───────────────────────────────────────────────── */
  input, select, textarea {
    background: transparent;
    color: var(--amber);
    border: none;
    border-bottom: 1px solid var(--line);
    font-family: var(--font);
    font-size: 12.5px;
    padding: 3px 6px;
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-bottom-color: var(--amber);
    color: var(--text);
  }
  select option { background: #0e0b07; color: var(--text); }
  textarea {
    border: 1px solid var(--line);
    background: rgba(0,0,0,0.3);
    padding: 6px 8px;
  }

  button {
    background: transparent;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    font-family: var(--font);
    font-size: 12px;
    padding: 4px 12px;
    cursor: pointer;
    letter-spacing: 0.6px;
    transition: all 0.15s;
  }
  button:hover:not(:disabled) {
    border-color: var(--amber);
    background: var(--amber-soft);
    text-shadow: 0 0 4px var(--amber-glow);
  }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  button.primary {
    color: var(--ok);
    border-color: var(--ok);
  }
  button.primary:hover:not(:disabled) {
    background: rgba(122,214,122,0.10);
    text-shadow: 0 0 4px rgba(122,214,122,0.5);
  }
  button.danger {
    color: var(--err);
    border-color: rgba(255,85,85,0.45);
  }
  button.danger:hover:not(:disabled) {
    border-color: var(--err);
    background: rgba(255,85,85,0.08);
  }
  button.sm { padding: 2px 8px; font-size: 11.5px; }

  /* ── Workflow grid (group + cards) ─────────────────────────────────── */
  .grp {
    border: 1px solid var(--line);
    margin-bottom: 6px;
  }
  .grp-head {
    padding: 6px 12px; cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 12px;
    color: var(--amber);
    font-size: 12px;
    letter-spacing: 1px;
  }
  .grp-head:hover { background: var(--amber-soft); }
  .grp-name { flex: 1; }
  .grp-stats {
    font-size: 11px; color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .grp-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 4px; padding: 6px 8px 8px;
    border-top: 1px dashed var(--line-soft);
  }
  .grp.collapsed .grp-grid { display: none; }

  .card {
    padding: 6px 10px;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--line);
    border-left: 3px solid var(--muted);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    font-size: 11.5px;
  }
  .card:hover { background: var(--amber-soft); border-color: var(--amber-dim); }
  .card.ok      { border-left-color: var(--ok); }
  .card.error   { border-left-color: var(--err); }
  .card.timeout { border-left-color: var(--warn); }
  .card.running { border-left-color: var(--blue); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.55; } }

  .card-name { color: var(--text); word-break: break-word; }
  .card-meta {
    font-size: 10.5px; color: var(--muted);
    margin-top: 2px;
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .tag {
    color: var(--amber);
    border: 1px solid var(--line-soft);
    padding: 0 4px;
    font-size: 10px;
    letter-spacing: 0.3px;
  }
  .tag.ok  { color: var(--ok);   border-color: rgba(122,214,122,0.25); }
  .tag.run { color: var(--blue); border-color: rgba(136,182,255,0.25); }
  .err-msg {
    font-size: 10.5px; color: var(--err);
    margin-top: 2px; max-height: 2.4em; overflow: hidden; line-height: 1.2;
  }

  /* ── Modal ─────────────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 1rem;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--screen);
    border: 1px solid var(--amber-dim);
    width: 100%; max-width: 1000px; max-height: 90vh;
    display: flex; flex-direction: column;
    box-shadow: 0 0 40px rgba(245,163,11,0.18);
  }
  .modal-head {
    padding: 8px 14px;
    border-bottom: 1px solid var(--amber-dim);
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, #1a1308, #0e0b07);
  }
  .modal-head h2 {
    flex: 1; color: var(--amber);
    font-size: 13px; letter-spacing: 1px;
    text-shadow: 0 0 4px var(--amber-glow);
  }
  .modal-body {
    flex: 1; overflow-y: auto;
    padding: 12px 16px;
  }
  .modal-body::-webkit-scrollbar { width: 8px; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--amber-dim); }

  .detail-section { margin-bottom: 14px; }
  .detail-section h3 {
    font-size: 11px; color: var(--amber);
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 6px; font-weight: 600;
    text-shadow: 0 0 4px var(--amber-glow);
  }
  .detail-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
  }
  .detail-item {
    border: 1px solid var(--line);
    padding: 5px 8px;
    background: rgba(0,0,0,0.25);
  }
  .detail-item .l {
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .detail-item .v {
    font-size: 12px; color: var(--text);
    margin-top: 2px;
    word-break: break-word;
  }

  pre {
    border: 1px solid var(--line);
    background: rgba(0,0,0,0.4);
    padding: 8px 10px;
    font-family: var(--font);
    font-size: 11.5px; line-height: 1.5;
    max-height: 360px; overflow: auto;
    color: var(--text); white-space: pre-wrap; word-break: break-all;
  }
  pre.compact { max-height: 160px; }

  .widget-row {
    display: grid; grid-template-columns: auto 1fr; gap: 8px;
    padding: 4px 8px;
    border: 1px solid var(--line);
    margin-bottom: 3px; font-size: 11.5px;
  }
  .widget-row .k { color: var(--blue); white-space: nowrap; }
  .widget-row .v { color: var(--text); word-break: break-all; }

  /* ── Submit form ───────────────────────────────────────────────────── */
  .submit-form {
    display: grid; grid-template-columns: 1fr 2fr auto; gap: 8px;
    margin-bottom: 8px;
  }
  .submit-form select, .submit-form input { width: 100%; }

  /* ── Commands ──────────────────────────────────────────────────────── */
  .cmd-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 6px;
  }
  .cmd-card {
    border: 1px solid var(--line);
    padding: 8px 12px;
    background: rgba(0,0,0,0.2);
    transition: border-color 0.12s, background 0.12s;
  }
  .cmd-card:hover { border-color: var(--amber-dim); }
  .cmd-card h3 {
    color: var(--amber);
    font-size: 12px; letter-spacing: 0.5px;
    margin-bottom: 4px;
    text-shadow: 0 0 4px var(--amber-glow);
  }
  .cmd-card .desc {
    font-size: 11px; color: var(--text-dim);
    margin-bottom: 6px; line-height: 1.4;
  }
  .cmd-params { display: grid; gap: 4px; margin-bottom: 6px; }
  .cmd-params label {
    display: flex; flex-direction: column; gap: 2px;
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .cmd-params input { padding: 2px 6px; font-size: 12px; }
  .cmd-card-foot {
    display: flex; align-items: center; justify-content: space-between;
    gap: 6px;
  }
  .cmd-status { font-size: 11px; color: var(--muted); }
  .cmd-status.running   { color: var(--blue); }
  .cmd-status.ok        { color: var(--ok); }
  .cmd-status.error     { color: var(--err); }
  .cmd-status.cancelled { color: var(--warn); }

  /* Bundle panel */
  .bundle-panel {
    border: 1px solid var(--line);
    padding: 12px;
    background: rgba(0,0,0,0.2);
  }
  .bundle-presets {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .bundle-presets button { flex: 1; min-width: 110px; }
  .slider-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px;
  }
  .slider-row > label {
    color: var(--amber); font-size: 11.5px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  #budgetSlider { flex: 1; accent-color: var(--amber); }
  #budgetVal {
    color: var(--amber);
    font-weight: 600;
    text-shadow: 0 0 4px var(--amber-glow);
    min-width: 80px; text-align: right;
  }

  /* Active runs */
  .run-row {
    border: 1px solid var(--line);
    padding: 5px 10px;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.2);
  }
  .run-row .run-id {
    font-size: 11px; color: var(--text-dim);
    flex: 1; min-width: 0; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── Live event stream ─────────────────────────────────────────────── */
  .stream {
    border: 1px solid var(--line);
    background: rgba(0,0,0,0.4);
    padding: 8px 12px;
    max-height: 70vh; overflow-y: auto;
    font-size: 12px; line-height: 1.55;
  }
  .stream-row {
    display: grid;
    grid-template-columns: 90px 70px 80px 1fr;
    gap: 10px;
    padding: 1px 0;
    color: var(--text);
  }
  .stream-row:hover { background: var(--amber-soft); }
  .stream-row .t { color: var(--muted); }
  .stream-row .k {
    color: var(--amber); text-transform: uppercase; letter-spacing: 0.6px;
  }
  .stream-row .src { color: var(--blue); }
  .stream-row .m { color: var(--text); word-break: break-word; }
  .stream-row.kind-warn  .k, .stream-row.kind-warn  .m { color: var(--warn); }
  .stream-row.kind-error .k, .stream-row.kind-error .m { color: var(--err); }
  .stream-row.kind-ok    .k { color: var(--ok); }

  .empty {
    padding: 24px; text-align: center;
    color: var(--muted); font-style: italic;
  }

  /* ── Toasts ────────────────────────────────────────────────────────── */
  .toasts {
    position: fixed; bottom: 16px; right: 16px;
    z-index: 200;
    display: flex; flex-direction: column; gap: 6px;
  }
  .toast {
    background: var(--screen);
    border: 1px solid var(--amber-dim);
    border-left: 2px solid var(--amber);
    padding: 6px 10px;
    min-width: 280px; max-width: 380px;
    font-size: 11.5px; line-height: 1.4;
    color: var(--text);
    box-shadow: 0 0 16px rgba(245,163,11,0.18);
    animation: slidein 0.2s ease-out;
  }
  .toast.ok  { border-left-color: var(--ok); }
  .toast.err { border-left-color: var(--err); }
  @keyframes slidein {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>

<div class="term">

  <div class="term-chrome">
    <span class="term-dot r"></span>
    <span class="term-dot y"></span>
    <span class="term-dot g"></span>
    <span class="term-title" id="term-title">orchestrator@magascii: ~/comfyui — workflow control plane</span>
    <span class="term-clock" id="term-clock">--:--:--</span>
  </div>

  <div class="term-screen" id="term-screen">

    <div class="banner-sub">
      ComfyUI Orchestrator · v2.3 · <span class="host" id="banner-host">localhost</span>
      &nbsp;|&nbsp; <span id="authStatus">connecting</span>
    </div>

    <div class="prompt-line">
      <span class="ps1">orchestrator@magascii:~$</span>
      <span class="cmd" id="cmd-display">tail -f workflows.log</span>
      <span class="caret">▊</span>
    </div>

    <div class="stats-strip" id="stats">
      <span class="stat">total=<em id="st-total">0</em></span>
      <span class="stat ok">ok=<em id="st-ok">0</em></span>
      <span class="stat err">err=<em id="st-err">0</em></span>
      <span class="stat warn">timeout=<em id="st-timeout">0</em></span>
      <span class="stat run">run=<em id="st-running">0</em></span>
      <span class="stat">untested=<em id="st-pending">0</em></span>
      <span class="stat">inst=<em id="st-instances">0</em></span>
      <span class="live" id="st-live">● LIVE</span>
    </div>

    <div class="banner-box" id="setupBanner" style="display:none">
      <div class="hints">
        <h3>First-run setup</h3>
        <div id="setupHints"></div>
      </div>
      <div style="display:flex; gap:6px; flex-wrap:wrap">
        <button class="primary" onclick="quickCommand('bootstrap_install')" id="btnBootstrap">Install ComfyUI</button>
        <button onclick="goToTab('commands')">View all commands</button>
      </div>
    </div>

    <div class="pills" id="tabs">
      <button class="pill active" data-tab="all">all</button>
      <button class="pill" data-tab="running">running</button>
      <button class="pill" data-tab="ok">success</button>
      <button class="pill" data-tab="error">errors</button>
      <button class="pill" data-tab="pending">untested</button>
      <button class="pill" data-tab="live">live</button>
      <button class="pill" data-tab="submit">submit</button>
      <button class="pill" data-tab="commands">commands</button>
    </div>

    <div id="content"><div class="empty">loading…</div></div>

  </div>
</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">workflow</h2>
      <button class="sm" onclick="closeModal()">close</button>
    </div>
    <div class="modal-body" id="modalBody">loading…</div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const API = window.location.origin;
let TOKEN = window.ORCHESTRATOR_TOKEN || localStorage.getItem("orchestrator_token") || "";
if (window.ORCHESTRATOR_TOKEN) {
  try { localStorage.setItem("orchestrator_token", window.ORCHESTRATOR_TOKEN); } catch {}
}
let DATA = null;
let COMMANDS_DATA = null;
let CURRENT_TAB = "all";
let SEARCH = "";
let LIVE_CONNECTED = true;

// Live event stream state
const LIVE = {
  events: [],          // newest last
  lastId: 0,
  maxRows: 300,
};

function authHeaders() { return TOKEN ? { "Authorization": "Bearer " + TOKEN } : {}; }
async function apiGet(path) {
  const r = await fetch(API + path, { headers: authHeaders() });
  if (r.status === 401) {
    document.getElementById("authStatus").textContent = "auth required";
    promptForToken(); throw new Error("auth required");
  }
  return await r.json();
}
async function apiPost(path, body) {
  const r = await fetch(API + path, {
    method: "POST",
    headers: { "Content-Type": "application/json", ...authHeaders() },
    body: body ? JSON.stringify(body) : undefined,
  });
  return await r.json();
}
function promptForToken() {
  const t = prompt("Bearer token:");
  if (t) { TOKEN = t; localStorage.setItem("orchestrator_token", t); refresh(); }
}
function toast(msg, kind = "info") {
  const t = document.createElement("div");
  t.className = "toast " + kind; t.textContent = msg;
  document.getElementById("toasts").appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; t.style.transition = "all .25s"; setTimeout(() => t.remove(), 250); }, 4000);
}
function escHTML(s) {
  return String(s||"").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;",
  })[c]);
}
function fmtTime(ts) {
  const d = new Date(ts * 1000);
  const p = n => String(n).padStart(2,"0");
  return `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

// ── Header clock ───────────────────────────────────────────────────────
function tickClock() {
  const d = new Date();
  const p = n => String(n).padStart(2, "0");
  document.getElementById("term-clock").textContent =
    `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
setInterval(tickClock, 1000); tickClock();

// ── Stats / instances ──────────────────────────────────────────────────
function renderStats(s, instances) {
  document.getElementById("st-total").textContent    = s.total;
  document.getElementById("st-ok").textContent       = s.ok;
  document.getElementById("st-err").textContent      = s.error;
  document.getElementById("st-timeout").textContent  = s.timeout;
  document.getElementById("st-running").textContent  = s.running || 0;
  document.getElementById("st-pending").textContent  = s.pending;
  document.getElementById("st-instances").textContent = instances?.length || 0;
  const liveEl = document.getElementById("st-live");
  if (instances && instances.length) {
    liveEl.classList.remove("off");
    liveEl.textContent = "● LIVE";
  } else {
    liveEl.classList.add("off");
    liveEl.textContent = "○ idle";
  }
  const auth = document.getElementById("authStatus");
  if (instances && instances.length) {
    auth.textContent = `${instances.length} instance${instances.length>1?"s":""}, load ${instances.reduce((a,i)=>a+i.load,0)}`;
  } else {
    auth.textContent = "no instance";
  }
}

// ── Workflow grid ───────────────────────────────────────────────────────
function renderGroups(groups, filter = "all") {
  const f = SEARCH.toLowerCase();
  const visible = groups.map(g => {
    const wfs = g.workflows.filter(w => {
      if (filter !== "all" && w.status !== filter) return false;
      if (f && !w.tid.toLowerCase().includes(f) && !g.name.toLowerCase().includes(f)) return false;
      return true;
    });
    return { ...g, _visible: wfs };
  }).filter(g => g._visible.length > 0);

  if (!visible.length) return `<div class="empty">no workflows match.</div>`;

  return visible.map(g => `
    <div class="grp" data-grp="${escHTML(g.name)}">
      <div class="grp-head" onclick="this.parentElement.classList.toggle('collapsed')">
        <div class="grp-name">› ${escHTML(g.name)}</div>
        <div class="grp-stats">${g.ok}/${g.workflows.length} ok · ${g.error} err · ${g.pending} untested</div>
      </div>
      <div class="grp-grid">
        ${g._visible.map(w => `
          <div class="card ${w.status}" data-tid="${escHTML(w.tid)}" onclick="showDetails('${escHTML(w.tid)}')">
            <div class="card-name">${escHTML(w.tid)}</div>
            <div class="card-meta">
              <span class="tag">ph${w.phase || "?"}</span>
              ${w.duration ? `<span class="tag">${w.duration}s</span>` : ""}
              ${w.instance ? `<span class="tag">${escHTML((w.instance||"").replace("http://","").slice(0,18))}</span>` : ""}
              ${w.status === "running" ? '<span class="tag run">running</span>' : ""}
              ${w.status === "ok" ? '<span class="tag ok">ok</span>' : ""}
            </div>
            ${w.error ? `<div class="err-msg" title="${escHTML(w.error)}">${escHTML(w.error.slice(0, 100))}</div>` : ""}
          </div>
        `).join("")}
      </div>
    </div>`).join("");
}

// ── Live event stream ──────────────────────────────────────────────────
function renderLiveStream() {
  const html = `
    <div class="section-head">live event stream — tail -f</div>
    <div style="font-size:11.5px; color:var(--muted); margin-bottom:8px">
      Real-time orchestrator activity. Newest at the bottom. Polls every second.
    </div>
    <div class="stream" id="streamBox">
      ${LIVE.events.length ? LIVE.events.map(renderEventRow).join("") : '<div class="empty">no events yet — kick off a command or job.</div>'}
    </div>
  `;
  return html;
}
function renderEventRow(ev) {
  const klass = `kind-${ev.kind || "info"}`;
  return `
    <div class="stream-row ${klass}">
      <span class="t">${fmtTime(ev.ts)}</span>
      <span class="k">${escHTML(ev.kind || "info")}</span>
      <span class="src">${escHTML(ev.source || "?")}</span>
      <span class="m">${escHTML(ev.message || "")}</span>
    </div>
  `;
}
async function pollEvents() {
  try {
    const data = await apiGet(`/api/events?since=${LIVE.lastId}`);
    if (data.events && data.events.length) {
      LIVE.events.push(...data.events);
      // Trim from the head if too many
      if (LIVE.events.length > LIVE.maxRows) {
        LIVE.events = LIVE.events.slice(-LIVE.maxRows);
      }
      LIVE.lastId = data.last_id || LIVE.lastId;
      // If the live tab is on screen, append rows; auto-scroll bottom
      if (CURRENT_TAB === "live") {
        const box = document.getElementById("streamBox");
        if (box) {
          // If user is scrolled near the bottom, keep auto-scroll
          const nearBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 50;
          for (const ev of data.events) {
            box.insertAdjacentHTML("beforeend", renderEventRow(ev));
          }
          if (nearBottom) box.scrollTop = box.scrollHeight;
        }
      }
    }
    LIVE_CONNECTED = true;
  } catch (e) {
    LIVE_CONNECTED = false;
  }
}
setInterval(pollEvents, 1000);

// ── Submit Job ──────────────────────────────────────────────────────────
function renderSubmit() {
  if (!DATA) return "loading…";
  return `
    <div class="section-head">submit a job</div>
    <div style="color:var(--text-dim);font-size:11.5px;margin-bottom:8px">
      Pick a workflow to run on an available instance.
    </div>
    <div class="submit-form">
      <select id="catSelect" onchange="updateWfList()">
        <option value="">all categories</option>
        ${[...new Set(DATA.groups.map(g => g.name))].sort().map(c =>
          `<option value="${escHTML(c)}">${escHTML(c)}</option>`).join("")}
      </select>
      <select id="wfSelect"></select>
      <button class="primary" onclick="submitJob()" id="submitBtn">run</button>
    </div>
    <textarea id="promptInput" rows="3" placeholder="override prompt (optional)…"
      style="width:100%;resize:vertical;margin-top:6px"></textarea>
  `;
}
function updateWfList() {
  const cat = document.getElementById("catSelect").value;
  const sel = document.getElementById("wfSelect");
  const items = DATA.groups.filter(g => !cat || g.name === cat)
    .flatMap(g => g.workflows.map(w => ({ ...w, cat: g.name })))
    .sort((a, b) => a.tid.localeCompare(b.tid));
  sel.innerHTML = items.map(w =>
    `<option value="${escHTML(w.tid)}">${escHTML(w.cat)} · ${escHTML(w.tid)} (${w.status})</option>`).join("");
}
async function submitJob() {
  const tid = document.getElementById("wfSelect").value;
  const prompt = document.getElementById("promptInput").value;
  if (!tid) return;
  document.getElementById("submitBtn").disabled = true;
  try {
    const res = await apiPost("/api/job", { template_id: tid, prompt });
    if (res.error) throw new Error(res.error);
    toast(`submitted: ${tid} → ${res.instance}`, "ok");
    setTimeout(refresh, 500);
  } catch (e) { toast("error: " + e.message, "err"); }
  finally { document.getElementById("submitBtn").disabled = false; }
}

// ── Commands panel ──────────────────────────────────────────────────────
const CMD_LABELS = {
  bootstrap_install: "install comfyui",
  apply_changes:     "apply changes",
  launch_comfyui:    "launch instance",
  catalog_build:     "build catalog",
  catalog_sync:      "sync templates",
  catalog_download:  "download models",
  catalog_status:    "catalog status",
  catalog_cleanup:   "cleanup obsolete",
  classify:          "classify workflows",
  export_api:        "export api workflows",
  starters:          "generate starters",
  gated_check:       "check gated models",
  install_workflows: "install workflow files",
  bundle_minimal:    "minimal preset",
  bundle_image:      "image preset",
  bundle_standard:   "standard preset",
  bundle_full:       "full preset",
};
function cleanLabel(cid, fallback) {
  return CMD_LABELS[cid] || (fallback || cid).replace(/^[^a-zA-Z0-9]+/, "").trim().toLowerCase();
}
function renderCmdCard(cid, c) {
  return `
    <div class="cmd-card" data-cid="${cid}">
      <h3>${escHTML(cleanLabel(cid, c.label))}</h3>
      <div class="desc">${escHTML(c.description||'')}</div>
      ${c.params && c.params.length ? `
        <div class="cmd-params">
          ${c.params.map(p => `
            <label>
              ${escHTML(p.label||p.name)}
              <input type="${p.type==='int'?'number':'text'}" name="${p.name}" value="${p.default}">
            </label>`).join("")}
        </div>` : ""}
      <div class="cmd-card-foot">
        <span class="cmd-status" data-status></span>
        <button onclick="runCommand('${cid}', this)" class="sm primary">run</button>
      </div>
    </div>`;
}
async function renderCommands() {
  COMMANDS_DATA = await apiGet("/api/commands");
  const cmds = COMMANDS_DATA.available;
  const running = COMMANDS_DATA.running;
  const SECTIONS = [
    { name: "setup",   ids: ["bootstrap_install", "apply_changes", "launch_comfyui"] },
    { name: "catalog", ids: ["catalog_build", "catalog_sync", "catalog_download", "catalog_status", "catalog_cleanup"] },
    { name: "tools",   ids: ["classify", "export_api", "starters", "gated_check", "install_workflows"] },
  ];
  const used = new Set();
  ["bundle_minimal","bundle_image","bundle_standard","bundle_full"].forEach(id => { if (cmds[id]) used.add(id); });

  const PRESETS = [
    { name: "minimal",  budget: 250,  desc: "text-to-image essentials" },
    { name: "image",    budget: 400,  desc: "flux + qwen-edit + controlnet" },
    { name: "standard", budget: 700,  desc: "image + video latest" },
    { name: "full",     budget: 1500, desc: "everything" },
  ];
  const bundlesHtml = `
    <div class="section-head">model budget</div>
    <div class="bundle-panel">
      <div class="bundle-presets">
        ${PRESETS.map(b => `
          <button onclick="document.getElementById('budgetSlider').value=${b.budget};document.getElementById('budgetSlider').dispatchEvent(new Event('input'))"
                  title="${escHTML(b.desc)}">
            ${b.name} · ${b.budget} GB
          </button>`).join("")}
      </div>
      <div class="slider-row">
        <label>budget</label>
        <input id="budgetSlider" type="range" min="100" max="2000" step="50" value="700">
        <span id="budgetVal">700 GB</span>
      </div>
      <div id="previewPanel"><div class="empty">move slider to preview…</div></div>
    </div>`;

  const sectionsHtml = SECTIONS.map(sec => {
    const items = sec.ids.filter(id => cmds[id]).map(id => { used.add(id); return [id, cmds[id]]; });
    if (!items.length) return "";
    return `
      <div class="section-head">${escHTML(sec.name)}</div>
      <div class="cmd-grid">
        ${items.map(([cid, c]) => renderCmdCard(cid, c)).join("")}
      </div>`;
  }).join("");

  const leftover = Object.entries(cmds).filter(([cid]) => !used.has(cid));
  const leftoverHtml = leftover.length ? `
    <div class="section-head">other</div>
    <div class="cmd-grid">
      ${leftover.map(([cid, c]) => renderCmdCard(cid, c)).join("")}
    </div>` : "";

  const runsHtml = `
    <div class="section-head">active &amp; recent runs</div>
    <div id="cmdActiveList">
      ${Object.entries(running||{}).map(([rid, info]) => {
        const isRunning = info.status === "running";
        return `
          <div class="run-row">
            <span class="cmd-status ${info.status}">${escHTML(info.status||"?")}</span>
            <span class="run-id" title="${escHTML(rid)}">${escHTML(rid)}</span>
            ${isRunning ? `<button class="danger sm" onclick="cancelRun('${rid}', this)">cancel</button>` : ""}
            <button class="sm" onclick="showCommandLog('${rid}')">log</button>
          </div>`;
      }).join("") || '<div class="empty">no commands ran yet.</div>'}
    </div>`;

  return bundlesHtml + sectionsHtml + leftoverHtml + runsHtml;
}
async function runCommand(cid, btn) {
  btn.disabled = true;
  const card = btn.closest(".cmd-card");
  const params = {};
  card.querySelectorAll("input[name]").forEach(i => { params[i.name] = i.value; });
  try {
    const res = await apiPost("/api/command", { id: cid, params });
    if (res.error) throw new Error(res.error);
    toast(`started: ${res.label || cid} (${res.id})`, "ok");
    card.querySelector("[data-status]").textContent = "running";
    card.querySelector("[data-status]").className = "cmd-status running";
    setTimeout(() => { if (CURRENT_TAB === "commands") renderTab(); }, 500);
  } catch (e) { toast("error: " + e.message, "err"); }
  finally { setTimeout(() => btn.disabled = false, 800); }
}
async function cancelRun(rid, btn) {
  btn.disabled = true; btn.textContent = "cancelling…";
  try {
    const res = await apiPost(`/api/command/cancel/${encodeURIComponent(rid)}`);
    if (res.error) throw new Error(res.error);
    toast(`cancelled ${rid}`, "ok");
    setTimeout(() => { if (CURRENT_TAB === "commands") renderTab(); }, 250);
  } catch (e) {
    toast("cancel failed: " + e.message, "err");
    btn.disabled = false; btn.textContent = "cancel";
  }
}
async function showCommandLog(rid) {
  const data = await apiGet(`/api/command/log/${encodeURIComponent(rid)}`);
  const isRunning = data.status === "running";
  const body = `
    <div class="detail-section">
      <h3>run info</h3>
      <div class="detail-grid">
        <div class="detail-item"><div class="l">id</div><div class="v">${escHTML(rid)}</div></div>
        <div class="detail-item"><div class="l">status</div><div class="v">${escHTML(data.status||'?')}</div></div>
        <div class="detail-item"><div class="l">pid</div><div class="v">${data.pid||'—'}</div></div>
        <div class="detail-item"><div class="l">return code</div><div class="v">${data.return_code===undefined?'—':data.return_code}</div></div>
      </div>
      ${isRunning ? `<div style="margin-top:8px"><button class="danger sm" onclick="cancelRunFromModal('${escHTML(rid)}')">cancel run</button></div>` : ""}
    </div>
    <div class="detail-section">
      <h3>command</h3>
      <pre class="compact">${escHTML(data.cmd||'')}</pre>
    </div>
    <div class="detail-section">
      <h3>log tail (last 8 KB)</h3>
      <pre id="logTail">${escHTML(data.tail||'(empty)')}</pre>
    </div>`;
  openModal(`run — ${rid}`, body);
}
async function cancelRunFromModal(rid) {
  try {
    const res = await apiPost(`/api/command/cancel/${encodeURIComponent(rid)}`);
    if (res.error) throw new Error(res.error);
    toast(`cancelled ${rid}`, "ok");
    closeModal();
    setTimeout(() => { if (CURRENT_TAB === "commands") renderTab(); }, 250);
  } catch (e) { toast("cancel failed: " + e.message, "err"); }
}

// ── Workflow details modal ─────────────────────────────────────────────
async function showDetails(tid) {
  openModal(escHTML(tid), '<div class="empty">loading…</div>');
  try {
    const w = await apiGet(`/api/workflow/${encodeURIComponent(tid)}`);
    if (w.error) {
      document.getElementById("modalBody").innerHTML = `<div class="empty">${escHTML(w.error)}</div>`;
      return;
    }
    const body = `
      <div class="detail-section">
        <h3>classification</h3>
        <div class="detail-grid">
          <div class="detail-item"><div class="l">phase</div><div class="v">${w.phase||'?'}</div></div>
          <div class="detail-item"><div class="l">category</div><div class="v">${escHTML(w.category||'?')}</div></div>
          <div class="detail-item"><div class="l">inputs</div><div class="v">${(w.inputs||[]).join(', ')||'—'}</div></div>
          <div class="detail-item"><div class="l">outputs</div><div class="v">${(w.outputs||[]).join(', ')||'—'}</div></div>
          <div class="detail-item"><div class="l">nodes</div><div class="v">${w.node_count||'?'}</div></div>
          <div class="detail-item"><div class="l">features</div><div class="v">${[
            w.has_lora?'lora':null, w.has_controlnet?'controlnet':null, w.has_ipadapter?'ipadapter':null
          ].filter(Boolean).join(', ')||'—'}</div></div>
        </div>
      </div>
      ${w.default_prompts && w.default_prompts.length ? `
        <div class="detail-section">
          <h3>default prompts</h3>
          ${w.default_prompts.map(p => `<pre class="compact">${escHTML(p)}</pre>`).join("")}
        </div>` : ""}
      ${w.widgets_overview && w.widgets_overview.length ? `
        <div class="detail-section">
          <h3>key widgets</h3>
          ${w.widgets_overview.map(o => `
            <div class="widget-row">
              <span class="k">[${o.node_id}] ${escHTML(o.type)}</span>
              <span class="v">${escHTML(JSON.stringify(o.widgets))}</span>
            </div>`).join("")}
        </div>` : ""}
      ${w.last_run && w.last_run.status ? `
        <div class="detail-section">
          <h3>last run</h3>
          <div class="detail-grid">
            <div class="detail-item"><div class="l">status</div><div class="v">${escHTML(w.last_run.status)}</div></div>
            <div class="detail-item"><div class="l">duration</div><div class="v">${w.last_run.duration||'?'}s</div></div>
            <div class="detail-item"><div class="l">instance</div><div class="v">${escHTML(w.last_run.instance||'?')}</div></div>
            <div class="detail-item"><div class="l">at</div><div class="v">${escHTML((w.last_run.last_run||'').slice(0,19))}</div></div>
          </div>
          ${w.last_run.error ? `<pre class="compact" style="margin-top:6px;color:var(--err)">${escHTML(w.last_run.error)}</pre>` : ""}
        </div>` : ""}
      <div class="detail-section">
        <h3>api workflow json ${w.api_available ? '' : '(not exported)'}</h3>
        ${w.api_available ? `<pre>${escHTML(JSON.stringify(w.api_graph, null, 2))}</pre>` : '<div class="empty">not exported. run command: <code>export_api</code></div>'}
      </div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="primary" onclick="quickRun('${escHTML(w.template_id)}')">run on least-loaded</button>
        <button onclick="copyJSON('${escHTML(w.template_id)}')">copy api json</button>
      </div>`;
    document.getElementById("modalBody").innerHTML = body;
    window._lastWf = w;
  } catch (e) {
    document.getElementById("modalBody").innerHTML = `<div class="empty">error: ${escHTML(e.message)}</div>`;
  }
}
async function quickRun(tid) {
  try {
    const res = await apiPost("/api/job", { template_id: tid });
    if (res.error) throw new Error(res.error);
    toast(`${tid} → ${res.instance}`, "ok");
    closeModal(); setTimeout(refresh, 500);
  } catch (e) { toast("error: " + e.message, "err"); }
}
function copyJSON(tid) {
  if (window._lastWf?.api_graph) {
    navigator.clipboard?.writeText(JSON.stringify(window._lastWf.api_graph, null, 2));
    toast("api json copied", "ok");
  }
}
function openModal(title, body) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = body;
  document.getElementById("modalOverlay").classList.remove("hidden");
}
function closeModal() { document.getElementById("modalOverlay").classList.add("hidden"); }
document.getElementById("modalOverlay").addEventListener("click", e => {
  if (e.target.id === "modalOverlay") closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ── Tabs / refresh ─────────────────────────────────────────────────────
async function quickCommand(cid, params = {}) {
  try {
    const res = await apiPost("/api/command", { id: cid, params });
    if (res.error) throw new Error(res.error);
    toast(`started: ${res.label || cid} (${res.id})`, "ok");
  } catch (e) { toast("error: " + e.message, "err"); }
}
function goToTab(name) {
  document.querySelectorAll(".pill").forEach(x => x.classList.remove("active"));
  document.querySelector(`[data-tab="${name}"]`).classList.add("active");
  CURRENT_TAB = name; renderTab();
}
async function checkSetup() {
  try {
    const s = await apiGet("/api/setup");
    const banner = document.getElementById("setupBanner");
    const hints = document.getElementById("setupHints");
    const todos = [];
    if (!s.comfyui_installed) todos.push("ComfyUI is not installed");
    if (!s.manifest_built) todos.push("Catalog manifest not built (use the Standard preset)");
    if (!s.classes_built) todos.push("Workflows not classified");
    if (!s.api_workflows_exported) todos.push("Workflows not exported as API JSON");
    if (!s.comfyui_running && s.comfyui_installed) todos.push("ComfyUI installed but not running (auto-launch on next job)");
    if (todos.length === 0) {
      banner.style.display = "none";
    } else {
      banner.style.display = "flex";
      hints.innerHTML = `<ul>${todos.map(t => `<li>${escHTML(t)}</li>`).join("")}</ul>` +
        (s.manifest && s.manifest.budget_gb
          ? `<div style="margin-top:4px; font-size:10.5px; color:var(--muted)">manifest: ${s.manifest.selection_count} models · ${s.manifest.selection_size_gb} GB · budget ${s.manifest.budget_gb} GB</div>`
          : "");
      const btn = document.getElementById("btnBootstrap");
      if (s.comfyui_installed) {
        btn.textContent = "apply changes";
        btn.onclick = () => quickCommand("apply_changes", { budget: 700 });
      }
    }
  } catch (e) { /* swallow */ }
}
function userIsInteracting() {
  const a = document.activeElement;
  if (!a) return false;
  return a.tagName === "INPUT" || a.tagName === "TEXTAREA" || a.tagName === "SELECT";
}
async function refresh() {
  try {
    const newData = await apiGet("/api/dashboard");
    DATA = newData;
    renderStats(DATA.stats, DATA.instances);
    if (!userIsInteracting()) {
      smartRenderTab();
    } else {
      patchWorkflowCards();
    }
    checkSetup();
  } catch (e) {
    if (e.message !== "auth required") console.warn("refresh failed:", e.message);
  }
}
function patchWorkflowCards() {
  if (!DATA) return;
  const allWfs = DATA.groups.flatMap(g => g.workflows);
  for (const w of allWfs) {
    document.querySelectorAll(`.card[data-tid="${cssEscape(w.tid)}"]`).forEach(card => {
      const cur = card.className.match(/card\s+(\w+)/)?.[1];
      if (cur !== w.status) card.className = "card " + w.status;
    });
  }
}
function cssEscape(s) { return String(s).replace(/(["\\])/g, "\\$1"); }
function smartRenderTab() {
  const c = document.getElementById("content");
  if (c.dataset.renderedTab !== CURRENT_TAB) {
    renderTab();
    c.dataset.renderedTab = CURRENT_TAB;
  } else if (CURRENT_TAB === "all" || ["running","ok","error","pending"].includes(CURRENT_TAB)) {
    patchWorkflowCards();
    DATA.groups.forEach(g => {
      const grpEl = document.querySelector(`.grp[data-grp="${cssEscape(g.name)}"] .grp-stats`);
      if (grpEl) grpEl.textContent = `${g.ok}/${g.workflows.length} ok · ${g.error} err · ${g.pending} untested`;
    });
  }
}
async function renderTab() {
  const c = document.getElementById("content");
  if (CURRENT_TAB === "submit")  { c.innerHTML = renderSubmit(); setTimeout(updateWfList, 0); return; }
  if (CURRENT_TAB === "live")    { c.innerHTML = renderLiveStream(); setTimeout(() => { const b=document.getElementById("streamBox"); if (b) b.scrollTop = b.scrollHeight; }, 0); return; }
  if (CURRENT_TAB === "commands"){
    c.innerHTML = '<div class="empty">loading…</div>';
    c.innerHTML = await renderCommands();
    setTimeout(initBundleSlider, 0);
    return;
  }
  c.innerHTML = renderGroups(DATA?.groups || [], CURRENT_TAB);
}

// ── Bundle slider with live preview ────────────────────────────────────
let _previewTimer = null;
async function fetchPreview(budget) {
  try { return await apiGet(`/api/preview?budget=${budget}`); }
  catch (e) { return { error: e.message }; }
}
function initBundleSlider() {
  const slider = document.getElementById("budgetSlider");
  if (!slider) return;
  const onSlide = () => {
    const v = +slider.value;
    document.getElementById("budgetVal").textContent = v + " GB";
    clearTimeout(_previewTimer);
    _previewTimer = setTimeout(() => updatePreview(v), 250);
  };
  slider.oninput = onSlide;
  onSlide();
}
async function updatePreview(budget) {
  const target = document.getElementById("previewPanel");
  if (!target) return;
  target.innerHTML = '<div class="empty">computing…</div>';
  const p = await fetchPreview(budget);
  if (p.error) {
    target.innerHTML = `<div class="empty" style="color:var(--err)">${escHTML(p.error)}</div>`;
    return;
  }
  const diffAdded = p.added_count > 0 ? `<span style="color:var(--ok)">+${p.added_count} models (+${p.added_size_gb} GB)</span>` : "";
  const diffRemoved = p.removed_count > 0 ? `<span style="color:var(--err)">−${p.removed_count} models</span>` : "";
  target.innerHTML = `
    <div class="detail-grid" style="margin-bottom:8px">
      <div class="detail-item"><div class="l">selection</div><div class="v">${p.selection_count} models</div></div>
      <div class="detail-item"><div class="l">total size</div><div class="v">${p.selection_size_gb} GB</div></div>
      <div class="detail-item"><div class="l">diff vs current</div><div class="v" style="font-size:11px">${diffAdded || ""}${diffAdded&&diffRemoved?" · ":""}${diffRemoved || (diffAdded?"":"no change")}</div></div>
      <div class="detail-item"><div class="l">families</div><div class="v">${p.by_family.length}</div></div>
    </div>
    <div style="max-height:280px;overflow:auto;border:1px solid var(--line);padding:6px 10px;background:rgba(0,0,0,0.3)">
      <table style="width:100%;font-size:11px;border-collapse:collapse">
        <thead><tr style="text-align:left;color:var(--muted);border-bottom:1px solid var(--line)">
          <th style="padding:3px 0">family</th><th>#</th><th style="text-align:right;padding-right:4px">size</th>
        </tr></thead>
        <tbody>
          ${p.by_family.map(f => `
            <tr style="border-bottom:1px dashed var(--line-soft)">
              <td style="padding:2px 0">${escHTML(f.family)}</td>
              <td>${f.count}</td>
              <td style="text-align:right">${f.size_gb} GB</td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>
    <div style="margin-top:10px;display:flex;gap:6px;align-items:center">
      <button class="primary" onclick="applyBudget(${budget})">apply this budget</button>
      <span style="font-size:11px;color:var(--muted)">— builds, downloads missing, removes obsolete (cancellable)</span>
    </div>`;
}
async function applyBudget(budget) {
  if (!confirm(`apply budget = ${budget} GB ?\n\nrebuilds the manifest, downloads new, removes obsolete. cancellable from active runs.`)) return;
  await runCommandById("apply_changes", { budget });
}
async function runCommandById(cid, params) {
  try {
    const res = await apiPost("/api/command", { id: cid, params });
    if (res.error) throw new Error(res.error);
    toast(`started: ${res.label || cid} (${res.id})`, "ok");
    if (CURRENT_TAB === "commands") setTimeout(renderTab, 250);
  } catch (e) { toast("error: " + e.message, "err"); }
}
document.querySelectorAll(".pill").forEach(t => {
  t.onclick = () => {
    document.querySelectorAll(".pill").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    CURRENT_TAB = t.dataset.tab; renderTab();
  };
});
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA") {
    e.preventDefault();
    const s = prompt("filter workflows:", SEARCH);
    if (s !== null) { SEARCH = s; renderTab(); }
  }
});

if (!TOKEN) promptForToken();
else { refresh(); pollEvents(); }
setInterval(refresh, 4000);
</script>
</body>
</html>
