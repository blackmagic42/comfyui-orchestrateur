<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ComfyUI Orchestrator</title>
<style>
  :root {
    --bg-1:#0a0a12; --bg-2:#14141d; --bg-3:#1c1c28; --bg-4:#252535;
    --border:#2a2a3a; --border-strong:#3a3a4f;
    --text:#e8e8f0; --text-dim:#8b8b9e; --text-muted:#5c5c70;
    --accent:#8b6dff; --accent-2:#5b8aff;
    --ok:#34d399; --err:#f87171; --warn:#fbbf24; --pending:#5c5c70;
    --running:#5b8aff;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { background:var(--bg-1); color:var(--text); font-family:'Inter',system-ui,-apple-system,sans-serif; min-height:100vh; }
  body { padding:1rem; max-width:1400px; margin:0 auto; }

  header {
    display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem;
    padding-bottom:1rem; border-bottom:1px solid var(--border);
  }
  header h1 { letter-spacing:-.02em; font-size:1.4rem; }
  .badge {
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    color:#fff; padding:.2rem .6rem; border-radius:6px; font-size:.7rem;
    text-transform:uppercase; letter-spacing:.05em; font-weight:600;
  }
  .auth-status { margin-left:auto; font-size:.8rem; color:var(--text-dim); }
  .auth-status.connected::before { content:"●"; color:var(--ok); margin-right:.4rem; }
  .auth-status.disconnected::before { content:"●"; color:var(--err); margin-right:.4rem; }

  .stats {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:.6rem; margin-bottom:1.5rem;
  }
  .stat {
    background:var(--bg-2); border:1px solid var(--border); border-radius:8px;
    padding:.7rem .9rem; position:relative; overflow:hidden;
  }
  .stat::before {
    content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--accent);
  }
  .stat .v { font-size:1.6rem; font-weight:700; line-height:1.1; letter-spacing:-.02em; }
  .stat .l { font-size:.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; font-weight:600; margin-top:.2rem; }
  .stat.ok::before { background:var(--ok); } .stat.ok .v { color:var(--ok); }
  .stat.err::before { background:var(--err); } .stat.err .v { color:var(--err); }
  .stat.run::before { background:var(--running); } .stat.run .v { color:var(--running); }
  .stat.warn::before { background:var(--warn); } .stat.warn .v { color:var(--warn); }

  .tabs { display:flex; gap:.4rem; margin-bottom:1rem; flex-wrap:wrap; }
  .tab {
    background:var(--bg-2); border:1px solid var(--border); color:var(--text-dim);
    padding:.45rem 1rem; border-radius:6px; cursor:pointer;
    font-family:inherit; font-size:.85rem; transition:all .15s;
  }
  .tab:hover { color:var(--text); border-color:var(--border-strong); }
  .tab.active {
    background:linear-gradient(135deg,rgba(139,109,255,.2),rgba(91,138,255,.12));
    color:var(--text); border-color:var(--accent);
  }

  .panel { background:var(--bg-2); border:1px solid var(--border); border-radius:10px; padding:1rem; }
  .panel h2 { font-size:.95rem; font-weight:600; margin-bottom:.8rem; display:flex; align-items:center; gap:.4rem; }
  .panel h2 .count { color:var(--text-dim); font-weight:400; font-size:.85rem; }

  .controls { display:flex; gap:.5rem; align-items:center; margin-bottom:.8rem; flex-wrap:wrap; }
  input,select,textarea {
    background:var(--bg-1); border:1px solid var(--border); color:var(--text);
    padding:.45rem .8rem; border-radius:6px; font-family:inherit; font-size:.85rem;
  }
  input:focus,select:focus,textarea:focus { border-color:var(--accent); outline:none; box-shadow:0 0 0 2px rgba(139,109,255,.18); }
  button {
    background:linear-gradient(135deg,var(--accent),var(--accent-2)); border:none; color:#fff;
    padding:.45rem .9rem; border-radius:6px; cursor:pointer; font-family:inherit; font-size:.85rem; font-weight:500;
    transition:transform .15s;
  }
  button.ghost { background:transparent; border:1px solid var(--border); color:var(--text-dim); }
  button.ghost:hover { color:var(--text); border-color:var(--border-strong); }
  button:hover:not(:disabled) { transform:translateY(-1px); }
  button:disabled { opacity:.5; cursor:not-allowed; }

  .grp { background:var(--bg-2); border:1px solid var(--border); border-radius:10px; margin-bottom:.6rem; overflow:hidden; }
  .grp-head {
    padding:.7rem .95rem; cursor:pointer; user-select:none;
    background:linear-gradient(180deg,rgba(139,109,255,.06),transparent);
    display:flex; align-items:center; gap:.6rem;
  }
  .grp-head:hover { background:linear-gradient(180deg,rgba(139,109,255,.10),transparent); }
  .grp-name { font-weight:600; flex:1; font-size:.92rem; }
  .grp-stats { font-size:.72rem; color:var(--text-dim); }
  .grp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:.5rem; padding:.5rem .7rem .8rem; }
  .grp.collapsed .grp-grid { display:none; }

  .card {
    padding:.55rem .65rem; background:var(--bg-1); border:1px solid var(--border);
    border-radius:7px; position:relative; cursor:pointer; transition:all .15s;
  }
  .card:hover { border-color:var(--accent); transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.4); }
  .card.ok::before, .card.error::before, .card.timeout::before, .card.pending::before, .card.running::before {
    content:""; position:absolute; left:0; top:.4rem; bottom:.4rem; width:3px; border-radius:0 2px 2px 0;
  }
  .card.ok::before { background:var(--ok); }
  .card.error::before { background:var(--err); }
  .card.timeout::before { background:var(--warn); }
  .card.pending::before { background:var(--pending); }
  .card.running::before { background:var(--running); animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

  .card-name { font-size:.78rem; font-weight:500; word-break:break-word; }
  .card-meta { font-size:.65rem; color:var(--text-dim); margin-top:.25rem; display:flex; gap:.3rem; flex-wrap:wrap; }
  .tag { background:rgba(139,109,255,.12); color:var(--accent); padding:.05rem .35rem; border-radius:3px; font-family:'SF Mono',monospace; }
  .tag.run { background:rgba(91,138,255,.18); color:var(--accent-2); }
  .tag.ok { background:rgba(52,211,153,.12); color:var(--ok); }
  .err-msg { font-size:.65rem; color:var(--err); margin-top:.25rem; max-height:2.4em; overflow:hidden; line-height:1.2; }

  /* Modal */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.85); backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center; z-index:100;
    padding:1rem;
  }
  .modal-overlay.hidden { display:none; }
  .modal {
    background:var(--bg-2); border:1px solid var(--border-strong); border-radius:12px;
    width:100%; max-width:980px; max-height:90vh; overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:0 20px 60px rgba(0,0,0,.7);
  }
  .modal-head {
    padding:1rem 1.2rem; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:.8rem;
    background:linear-gradient(180deg,rgba(139,109,255,.08),transparent);
  }
  .modal-head h2 { flex:1; font-size:1rem; }
  .modal-body { flex:1; overflow-y:auto; padding:1rem 1.2rem; }
  .modal-body::-webkit-scrollbar { width:8px; }
  .modal-body::-webkit-scrollbar-thumb { background:var(--border-strong); border-radius:4px; }

  .detail-section { margin-bottom:1.2rem; }
  .detail-section h3 {
    font-size:.78rem; color:var(--text-dim); text-transform:uppercase;
    letter-spacing:.06em; margin-bottom:.5rem; font-weight:600;
  }
  .detail-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:.5rem; }
  .detail-item { background:var(--bg-1); border:1px solid var(--border); border-radius:6px; padding:.5rem .7rem; }
  .detail-item .l { font-size:.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; }
  .detail-item .v { font-size:.85rem; font-weight:500; margin-top:.15rem; word-break:break-word; }

  pre {
    background:var(--bg-1); border:1px solid var(--border); border-radius:6px;
    padding:.7rem .9rem; font-family:'SF Mono','JetBrains Mono',monospace;
    font-size:.72rem; line-height:1.5; max-height:400px; overflow:auto;
    color:var(--text); white-space:pre-wrap; word-break:break-all;
  }
  pre.compact { max-height:180px; }

  .widget-row {
    display:grid; grid-template-columns:auto 1fr; gap:.5rem;
    padding:.45rem .65rem; background:var(--bg-1); border:1px solid var(--border);
    border-radius:6px; margin-bottom:.3rem; font-size:.78rem;
  }
  .widget-row .k { font-family:monospace; color:var(--accent); white-space:nowrap; }
  .widget-row .v { color:var(--text); word-break:break-all; }

  .submit-form { display:grid; grid-template-columns:1fr 2fr auto; gap:.5rem; margin-bottom:.8rem; }
  .submit-form select, .submit-form input { width:100%; }

  /* Commands panel */
  .cmd-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:.6rem; }
  .cmd-card {
    background:var(--bg-1); border:1px solid var(--border); border-radius:8px;
    padding:.85rem 1rem; transition:all .15s;
  }
  .cmd-card:hover { border-color:var(--accent); }
  .cmd-card h3 { font-size:.95rem; margin-bottom:.3rem; }
  .cmd-card .desc { font-size:.78rem; color:var(--text-dim); margin-bottom:.6rem; line-height:1.4; }
  .cmd-params { display:grid; gap:.3rem; margin-bottom:.5rem; }
  .cmd-params label { display:flex; flex-direction:column; gap:.15rem; font-size:.7rem; color:var(--text-dim); }
  .cmd-params input { padding:.3rem .5rem; font-size:.8rem; }
  .cmd-card-foot { display:flex; align-items:center; justify-content:space-between; }
  .cmd-status { font-size:.7rem; color:var(--text-dim); }
  .cmd-status.running { color:var(--running); }
  .cmd-status.ok { color:var(--ok); }
  .cmd-status.error { color:var(--err); }

  .empty { padding:2rem 1rem; text-align:center; color:var(--text-dim); }

  /* Toasts */
  .toasts { position:fixed; top:1rem; right:1rem; z-index:200; display:flex; flex-direction:column; gap:.4rem; }
  .toast {
    background:var(--bg-3); border:1px solid var(--border-strong); border-left:3px solid var(--accent);
    padding:.6rem .9rem; border-radius:6px; min-width:280px; max-width:380px;
    font-size:.85rem; animation:slidein .25s; box-shadow:0 8px 24px rgba(0,0,0,.5);
  }
  .toast.ok { border-left-color:var(--ok); }
  .toast.err { border-left-color:var(--err); }
  @keyframes slidein { from{transform:translateX(20px);opacity:0} to{transform:translateX(0);opacity:1} }
</style>
</head>
<body>

<header>
  <h1>🎛️ ComfyUI Orchestrator</h1>
  <div class="badge">v2.1</div>
  <div class="auth-status" id="authStatus">connecting...</div>
</header>

<!-- Setup banner — shown only when first-time setup is needed -->
<div id="setupBanner" style="display:none; background:linear-gradient(135deg,rgba(139,109,255,.18),rgba(91,138,255,.10));
     border:1px solid rgba(139,109,255,.35); border-radius:10px; padding:1rem 1.2rem; margin-bottom:1.2rem;
     display:flex; gap:1rem; align-items:center; flex-wrap:wrap;">
  <div style="font-size:2rem">⚙</div>
  <div style="flex:1; min-width:240px">
    <h3 style="margin-bottom:.3rem">Première installation détectée</h3>
    <div id="setupHints" style="font-size:.85rem; color:var(--text-dim); line-height:1.5"></div>
  </div>
  <div style="display:flex; gap:.5rem; flex-wrap:wrap">
    <button onclick="quickCommand('bootstrap_install')" id="btnBootstrap">⚙ Install ComfyUI</button>
    <button onclick="goToCommands()" class="ghost">⚙ Voir toutes les commandes</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="tabs">
  <button class="tab active" data-tab="all">All</button>
  <button class="tab" data-tab="running">Running</button>
  <button class="tab" data-tab="ok">Success</button>
  <button class="tab" data-tab="error">Errors</button>
  <button class="tab" data-tab="pending">Untested</button>
  <button class="tab" data-tab="submit">Submit Job</button>
  <button class="tab" data-tab="commands">⚙ Commands</button>
</div>

<div class="panel" id="content">
  <div class="empty">Loading…</div>
</div>

<!-- Workflow detail modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Workflow</h2>
      <button class="ghost" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">Loading…</div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const API = window.location.origin;
let TOKEN = localStorage.getItem("orchestrator_token") || "";
let DATA = null;
let COMMANDS_DATA = null;
let CURRENT_TAB = "all";
let SEARCH = "";

function authHeaders() { return TOKEN ? { "Authorization": "Bearer " + TOKEN } : {}; }

async function apiGet(path) {
  const r = await fetch(API + path, { headers: authHeaders() });
  if (r.status === 401) {
    document.getElementById("authStatus").textContent = "auth required";
    document.getElementById("authStatus").className = "auth-status disconnected";
    promptForToken(); throw new Error("auth required");
  }
  return await r.json();
}
async function apiPost(path, body) {
  const r = await fetch(API + path, {
    method: "POST",
    headers: { "Content-Type": "application/json", ...authHeaders() },
    body: JSON.stringify(body),
  });
  return await r.json();
}
function promptForToken() {
  const t = prompt("Bearer token (collez celui affiché par orchestrator.py serve):");
  if (t) { TOKEN = t; localStorage.setItem("orchestrator_token", t); refresh(); }
}
function toast(msg, kind = "info") {
  const t = document.createElement("div");
  t.className = "toast " + kind; t.textContent = msg;
  document.getElementById("toasts").appendChild(t);
  setTimeout(() => { t.style.opacity="0"; t.style.transition="all .3s"; setTimeout(() => t.remove(), 300); }, 4500);
}
function escHTML(s) { return String(s||"").replace(/[&<>"']/g, c => ({
  "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;",
})[c]); }

// ── Stats / instances ──────────────────────────────────────────────────
function renderStats(s) {
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="v">${s.total}</div><div class="l">Total</div></div>
    <div class="stat ok"><div class="v">${s.ok}</div><div class="l">✅ Success</div></div>
    <div class="stat err"><div class="v">${s.error}</div><div class="l">✗ Errors</div></div>
    <div class="stat warn"><div class="v">${s.timeout}</div><div class="l">⏱ Timeout</div></div>
    <div class="stat run"><div class="v">${s.running||0}</div><div class="l">▶ Running</div></div>
    <div class="stat"><div class="v">${s.pending}</div><div class="l">○ Untested</div></div>
  `;
}
function renderInstances(insts) {
  const status = document.getElementById("authStatus");
  if (!insts || !insts.length) { status.textContent = "no live instance"; status.className = "auth-status disconnected"; }
  else { status.textContent = `${insts.length} instance(s) · load=${insts.reduce((a,i)=>a+i.load,0)}`; status.className = "auth-status connected"; }
}

// ── Workflow grid ───────────────────────────────────────────────────────
function renderGroups(groups, filter = "all") {
  const f = SEARCH.toLowerCase();
  const visible = groups.map(g => {
    const wfs = g.workflows.filter(w => {
      if (filter !== "all" && w.status !== filter) return false;
      if (f && !w.tid.toLowerCase().includes(f) && !g.name.toLowerCase().includes(f)) return false;
      return true;
    });
    return { ...g, _visible: wfs };
  }).filter(g => g._visible.length > 0);

  if (!visible.length) return `<div class="empty">No workflows match.</div>`;

  return visible.map(g => `
    <div class="grp" data-grp="${escHTML(g.name)}">
      <div class="grp-head" onclick="this.parentElement.classList.toggle('collapsed')">
        <div class="grp-name">📂 ${escHTML(g.name)}</div>
        <div class="grp-stats">${g.ok}/${g.workflows.length} ok · ${g.error} err · ${g.pending} ○</div>
      </div>
      <div class="grp-grid">
        ${g._visible.map(w => `
          <div class="card ${w.status}" data-tid="${escHTML(w.tid)}" onclick="showDetails('${escHTML(w.tid)}')">
            <div class="card-name">${escHTML(w.tid)}</div>
            <div class="card-meta">
              <span class="tag">ph${w.phase || "?"}</span>
              ${w.duration ? `<span class="tag">${w.duration}s</span>` : ""}
              ${w.instance ? `<span class="tag">${escHTML((w.instance||"").replace("http://","").slice(0,18))}</span>` : ""}
              ${w.status === "running" ? '<span class="tag run">▶ running</span>' : ""}
              ${w.status === "ok" ? '<span class="tag ok">✓</span>' : ""}
            </div>
            ${w.error ? `<div class="err-msg" title="${escHTML(w.error)}">${escHTML(w.error.slice(0, 100))}</div>` : ""}
          </div>
        `).join("")}
      </div>
    </div>`).join("");
}

// ── Submit Job ──────────────────────────────────────────────────────────
function renderSubmit() {
  if (!DATA) return "Loading…";
  return `
    <h2>📤 Submit a job</h2>
    <p style="color:var(--text-dim);font-size:.85rem;margin-bottom:1rem">
      Pick a workflow to run on an available instance.
    </p>
    <div class="submit-form">
      <select id="catSelect" onchange="updateWfList()">
        <option value="">All categories</option>
        ${[...new Set(DATA.groups.map(g => g.name))].sort().map(c =>
          `<option value="${escHTML(c)}">${escHTML(c)}</option>`).join("")}
      </select>
      <select id="wfSelect"></select>
      <button onclick="submitJob()" id="submitBtn">▶ Run</button>
    </div>
    <textarea id="promptInput" rows="3" placeholder="Override prompt (optional)…"
      style="width:100%;resize:vertical;margin-top:.6rem"></textarea>
  `;
}
function updateWfList() {
  const cat = document.getElementById("catSelect").value;
  const sel = document.getElementById("wfSelect");
  const items = DATA.groups.filter(g => !cat || g.name === cat)
    .flatMap(g => g.workflows.map(w => ({ ...w, cat: g.name })))
    .sort((a, b) => a.tid.localeCompare(b.tid));
  sel.innerHTML = items.map(w =>
    `<option value="${escHTML(w.tid)}">${escHTML(w.cat)} · ${escHTML(w.tid)} (${w.status})</option>`).join("");
}
async function submitJob() {
  const tid = document.getElementById("wfSelect").value;
  const prompt = document.getElementById("promptInput").value;
  if (!tid) return;
  document.getElementById("submitBtn").disabled = true;
  try {
    const res = await apiPost("/api/job", { template_id: tid, prompt });
    if (res.error) throw new Error(res.error);
    toast(`📤 Job submitted: ${tid} → ${res.instance}`, "ok");
    setTimeout(refresh, 500);
  } catch (e) { toast("Error: " + e.message, "err"); }
  finally { document.getElementById("submitBtn").disabled = false; }
}

// ── Commands panel ──────────────────────────────────────────────────────
function renderCmdCard(cid, c) {
  return `
    <div class="cmd-card" data-cid="${cid}">
      <h3>${escHTML(c.label)}</h3>
      <div class="desc">${escHTML(c.description||'')}</div>
      ${c.params && c.params.length ? `
        <div class="cmd-params">
          ${c.params.map(p => `
            <label>
              ${escHTML(p.label||p.name)}
              <input type="${p.type==='int'?'number':'text'}" name="${p.name}" value="${p.default}">
            </label>`).join("")}
        </div>` : ""}
      <div class="cmd-card-foot">
        <span class="cmd-status" data-status></span>
        <button onclick="runCommand('${cid}', this)">Run</button>
      </div>
    </div>`;
}

async function renderCommands() {
  COMMANDS_DATA = await apiGet("/api/commands");
  const cmds = COMMANDS_DATA.available;
  const running = COMMANDS_DATA.running;

  // Group commands in logical sections
  const SECTIONS = [
    { name: "🚀 Setup (one-shot)", ids: ["bootstrap_install", "apply_changes", "launch_comfyui"] },
    { name: "🔧 Catalog management", ids: ["catalog_build", "catalog_sync", "catalog_download", "catalog_status", "catalog_cleanup"] },
    { name: "🛠 Tools", ids: ["classify", "export_api", "starters", "gated_check", "install_workflows"] },
  ];

  const used = new Set();

  // Bundle presets — replaced by an interactive slider with live /api/preview
  const bundleIds = ["bundle_minimal", "bundle_image", "bundle_standard", "bundle_full"];
  bundleIds.forEach(id => { if (cmds[id]) used.add(id); });

  const BUNDLE_PRESETS = [
    { name: "Minimal",  budget: 250,  desc: "text→image essentials" },
    { name: "Image",    budget: 400,  desc: "Flux + Qwen-Edit + ControlNet" },
    { name: "Standard", budget: 700,  desc: "image + video latest" },
    { name: "Full",     budget: 1500, desc: "everything, no cap" },
  ];
  const bundlesHtml = `
    <h3 style="margin-top:1.2rem; margin-bottom:.5rem; font-size:.85rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em">
      📦 Bundles & budget tuner
    </h3>
    <div style="background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:1rem">
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem">
        ${BUNDLE_PRESETS.map(b => `
          <button class="ghost" style="padding:.5rem .8rem"
            onclick="document.getElementById('budgetSlider').value=${b.budget};document.getElementById('budgetSlider').dispatchEvent(new Event('input'))">
            <b>${b.name}</b> · ${b.budget} GB
          </button>
        `).join("")}
      </div>
      <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:1rem">
        <label style="color:var(--text-dim);font-size:.85rem">Budget</label>
        <input id="budgetSlider" type="range" min="100" max="2000" step="50" value="700"
               style="flex:1;accent-color:var(--accent)">
        <span id="budgetVal" style="font-family:monospace;color:var(--accent);font-weight:600;min-width:80px;text-align:right">700 GB</span>
      </div>
      <div id="previewPanel"><div class="empty" style="padding:1rem">Move slider to preview…</div></div>
    </div>`;

  const sectionsHtml = SECTIONS.map(sec => {
    const items = sec.ids.filter(id => cmds[id]).map(id => { used.add(id); return [id, cmds[id]]; });
    if (!items.length) return "";
    return `
      <h3 style="margin-top:1.2rem; margin-bottom:.5rem; font-size:.85rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em">
        ${escHTML(sec.name)}
      </h3>
      <div class="cmd-grid">
        ${items.map(([cid, c]) => renderCmdCard(cid, c)).join("")}
      </div>`;
  }).join("");

  // Catch-all for any unbucketed commands
  const leftover = Object.entries(cmds).filter(([cid]) => !used.has(cid));
  const leftoverHtml = leftover.length ? `
    <h3 style="margin-top:1.2rem; margin-bottom:.5rem; font-size:.85rem; color:var(--text-dim)">Other</h3>
    <div class="cmd-grid">
      ${leftover.map(([cid, c]) => renderCmdCard(cid, c)).join("")}
    </div>` : "";

  return `
    <h2>⚙ Commands  <span class="count">— launched on the local host</span></h2>
    <p style="color:var(--text-dim);font-size:.85rem;margin-bottom:1rem">
      Whitelisted scripts ; logs captured per run.
      <br><b>Tip</b> : commence par un <b>Bundle</b> puis lance <b>Apply changes</b> pour appliquer.
    </p>
    ${bundlesHtml}
    ${sectionsHtml}
    ${leftoverHtml}
    <div style="margin-top:1.5rem">
      <h3 style="font-size:.85rem;margin-bottom:.5rem">Active / recent runs</h3>
      <div id="cmdActiveList">
        ${Object.entries(running||{}).map(([rid, info]) => `
          <div style="background:var(--bg-1);border:1px solid var(--border);border-radius:6px;padding:.55rem .7rem;margin-bottom:.4rem;display:flex;align-items:center;gap:.6rem">
            <span class="cmd-status ${info.status}">${info.status==='running'?'▶':info.status==='ok'?'✓':'✗'}</span>
            <span style="font-family:monospace;font-size:.75rem;color:var(--text-dim);flex:1">${escHTML(rid)}</span>
            <button class="ghost" onclick="showCommandLog('${rid}')">📜 Log</button>
          </div>
        `).join("") || '<div class="empty">No commands ran yet</div>'}
      </div>
    </div>
  `;
}
async function runCommand(cid, btn) {
  btn.disabled = true;
  const card = btn.closest(".cmd-card");
  const params = {};
  card.querySelectorAll("input[name]").forEach(i => { params[i.name] = i.value; });
  try {
    const res = await apiPost("/api/command", { id: cid, params });
    if (res.error) throw new Error(res.error);
    toast(`▶ Started: ${res.label} (run id: ${res.id})`, "ok");
    card.querySelector("[data-status]").textContent = "running";
    card.querySelector("[data-status]").className = "cmd-status running";
    setTimeout(() => { if (CURRENT_TAB === "commands") renderTab(); }, 500);
  } catch (e) { toast("Error: " + e.message, "err"); }
  finally { setTimeout(() => btn.disabled = false, 800); }
}
async function showCommandLog(rid) {
  const data = await apiGet(`/api/command/log/${encodeURIComponent(rid)}`);
  const body = `
    <div class="detail-section">
      <h3>Run info</h3>
      <div class="detail-grid">
        <div class="detail-item"><div class="l">ID</div><div class="v">${escHTML(rid)}</div></div>
        <div class="detail-item"><div class="l">Status</div><div class="v">${escHTML(data.status||'?')}</div></div>
        <div class="detail-item"><div class="l">PID</div><div class="v">${data.pid||'?'}</div></div>
        <div class="detail-item"><div class="l">Return code</div><div class="v">${data.return_code===undefined?'-':data.return_code}</div></div>
      </div>
    </div>
    <div class="detail-section">
      <h3>Command</h3>
      <pre class="compact">${escHTML(data.cmd||'')}</pre>
    </div>
    <div class="detail-section">
      <h3>Log tail (last 8 KB)</h3>
      <pre id="logTail">${escHTML(data.tail||'(empty)')}</pre>
    </div>`;
  openModal(`Command log — ${rid}`, body);
}

// ── Workflow details modal ─────────────────────────────────────────────

  openModal(escHTML(tid), '<div class="empty">Loading…</div>');
  try {
    const w = await apiGet(`/api/workflow/${encodeURIComponent(tid)}`);
    if (w.error) {
      document.getElementById("modalBody").innerHTML = `<div class="empty">${escHTML(w.error)}</div>`;
      return;
    }
    const body = `
      <div class="detail-section">
        <h3>Classification</h3>
        <div class="detail-grid">
          <div class="detail-item"><div class="l">Phase</div><div class="v">${w.phase||'?'}</div></div>
          <div class="detail-item"><div class="l">Category</div><div class="v">${escHTML(w.category||'?')}</div></div>
          <div class="detail-item"><div class="l">Inputs</div><div class="v">${(w.inputs||[]).join(', ')||'-'}</div></div>
          <div class="detail-item"><div class="l">Outputs</div><div class="v">${(w.outputs||[]).join(', ')||'-'}</div></div>
          <div class="detail-item"><div class="l">Nodes</div><div class="v">${w.node_count||'?'}</div></div>
          <div class="detail-item"><div class="l">Features</div><div class="v">${[
            w.has_lora?'LoRA':null, w.has_controlnet?'ControlNet':null, w.has_ipadapter?'IPAdapter':null
          ].filter(Boolean).join(', ')||'-'}</div></div>
        </div>
      </div>
      ${w.default_prompts && w.default_prompts.length ? `
        <div class="detail-section">
          <h3>Default prompts (extracted from CLIPTextEncode)</h3>
          ${w.default_prompts.map(p => `<pre class="compact">${escHTML(p)}</pre>`).join("")}
        </div>` : ""}
      ${w.widgets_overview && w.widgets_overview.length ? `
        <div class="detail-section">
          <h3>Key widgets (samplers, prompts, latents)</h3>
          ${w.widgets_overview.map(o => `
            <div class="widget-row">
              <span class="k">[${o.node_id}] ${escHTML(o.type)}</span>
              <span class="v">${escHTML(JSON.stringify(o.widgets))}</span>
            </div>`).join("")}
        </div>` : ""}
      ${w.last_run && w.last_run.status ? `
        <div class="detail-section">
          <h3>Last run</h3>
          <div class="detail-grid">
            <div class="detail-item"><div class="l">Status</div><div class="v">${escHTML(w.last_run.status)}</div></div>
            <div class="detail-item"><div class="l">Duration</div><div class="v">${w.last_run.duration||'?'}s</div></div>
            <div class="detail-item"><div class="l">Instance</div><div class="v">${escHTML(w.last_run.instance||'?')}</div></div>
            <div class="detail-item"><div class="l">Last run at</div><div class="v">${escHTML((w.last_run.last_run||'').slice(0,19))}</div></div>
          </div>
          ${w.last_run.error ? `<pre class="compact" style="margin-top:.6rem;color:var(--err)">${escHTML(w.last_run.error)}</pre>` : ""}
          ${w.last_run.outputs && w.last_run.outputs.length ? `
            <div style="margin-top:.6rem">
              <h3 style="font-size:.7rem">Outputs</h3>
              ${w.last_run.outputs.map(o =>
                `<div style="font-family:monospace;font-size:.72rem;color:var(--text-dim)">${escHTML(o.kind)}: ${escHTML(o.subfolder?o.subfolder+'/':'')}${escHTML(o.filename)}</div>`
              ).join("")}
            </div>` : ""}
        </div>` : ""}
      <div class="detail-section">
        <h3>API workflow JSON ${w.api_available ? '✓' : '⚠ not exported'}</h3>
        ${w.api_available ? `<pre>${escHTML(JSON.stringify(w.api_graph, null, 2))}</pre>` : '<div class="empty">Not yet exported. Run command: <code>export_api</code></div>'}
      </div>
      <div style="display:flex;gap:.5rem;margin-top:1rem">
        <button onclick="quickRun('${escHTML(w.template_id)}')">▶ Run on least-loaded instance</button>
        <button class="ghost" onclick="copyJSON('${escHTML(w.template_id)}')">📋 Copy API JSON</button>
      </div>
    `;
    document.getElementById("modalBody").innerHTML = body;
    window._lastWf = w;
  } catch (e) {
    document.getElementById("modalBody").innerHTML = `<div class="empty">Error: ${escHTML(e.message)}</div>`;
  }
}
async function quickRun(tid) {
  try {
    const res = await apiPost("/api/job", { template_id: tid });
    if (res.error) throw new Error(res.error);
    toast(`▶ ${tid} → ${res.instance}`, "ok");
    closeModal(); setTimeout(refresh, 500);
  } catch (e) { toast("Error: " + e.message, "err"); }
}
function copyJSON(tid) {
  if (window._lastWf?.api_graph) {
    navigator.clipboard?.writeText(JSON.stringify(window._lastWf.api_graph, null, 2));
    toast("📋 API JSON copied", "ok");
  }
}
function openModal(title, body) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = body;
  document.getElementById("modalOverlay").classList.remove("hidden");
}
function closeModal() { document.getElementById("modalOverlay").classList.add("hidden"); }
document.getElementById("modalOverlay").addEventListener("click", e => {
  if (e.target.id === "modalOverlay") closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ── Tabs / refresh ─────────────────────────────────────────────────────
async function quickCommand(cid, params = {}) {
  try {
    const res = await apiPost("/api/command", { id: cid, params });
    if (res.error) throw new Error(res.error);
    toast(`▶ Started: ${res.label} (${res.id})`, "ok");
  } catch (e) { toast("Error: " + e.message, "err"); }
}

function goToCommands() {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  document.querySelector('[data-tab="commands"]').classList.add("active");
  CURRENT_TAB = "commands"; renderTab();
}

async function checkSetup() {
  try {
    const s = await apiGet("/api/setup");
    const banner = document.getElementById("setupBanner");
    const hints = document.getElementById("setupHints");
    const todos = [];
    if (!s.comfyui_installed) todos.push("ComfyUI n'est pas installé");
    if (!s.manifest_built) todos.push("Catalog non construit (lance Bundle: Standard)");
    if (!s.classes_built) todos.push("Workflows non classifiés");
    if (!s.api_workflows_exported) todos.push("Workflows API non exportés");
    if (!s.comfyui_running && s.comfyui_installed) todos.push("ComfyUI installé mais non lancé (auto-launch au prochain job)");

    if (todos.length === 0) {
      banner.style.display = "none";
    } else {
      banner.style.display = "flex";
      hints.innerHTML = `<ul style="margin:.4rem 0 0 1.2rem; padding:0">${todos.map(t => `<li>${escHTML(t)}</li>`).join("")}</ul>` +
        (s.manifest && s.manifest.budget_gb ? `<div style="margin-top:.5rem; font-size:.75rem; color:var(--text-muted)">Manifest courant: ${s.manifest.selection_count} modèles · ${s.manifest.selection_size_gb} GB · budget=${s.manifest.budget_gb} GB</div>` : "");
      // Adjust button label if ComfyUI is already installed
      const btn = document.getElementById("btnBootstrap");
      if (s.comfyui_installed) {
        btn.textContent = "✨ Apply changes (build + download)";
        btn.onclick = () => quickCommand("apply_changes", { budget: 700 });
      }
    }
  } catch (e) { /* swallow */ }
}

// Track if user is interacting so we don't blow away their input/scroll
function userIsInteracting() {
  const a = document.activeElement;
  if (!a) return false;
  return a.tagName === "INPUT" || a.tagName === "TEXTAREA" || a.tagName === "SELECT";
}

async function refresh() {
  try {
    const newData = await apiGet("/api/dashboard");
    DATA = newData;
    // Always update top-level stats & instances (lightweight, no input loss)
    renderStats(DATA.stats); renderInstances(DATA.instances);

    // Granular re-render of the tab only if user isn't interacting
    if (!userIsInteracting()) {
      smartRenderTab();
    } else {
      // Still update job statuses in-place even during interaction
      patchWorkflowCards();
    }
    checkSetup();
  } catch (e) {
    if (e.message !== "auth required") console.warn("Refresh failed:", e.message);
  }
}

/** In-place patch each workflow card based on latest DATA — no innerHTML wipe. */
function patchWorkflowCards() {
  if (!DATA) return;
  const allWfs = DATA.groups.flatMap(g => g.workflows);
  for (const w of allWfs) {
    document.querySelectorAll(`.card[data-tid="${cssEscape(w.tid)}"]`).forEach(card => {
      const cur = card.className.match(/card\s+(\w+)/)?.[1];
      if (cur !== w.status) {
        card.className = "card " + w.status;
      }
    });
  }
}

function cssEscape(s) {
  // Minimal escape for use in attribute selector
  return String(s).replace(/(["\\])/g, "\\$1");
}

/** Smart tab render — replaces content only when needed. */
function smartRenderTab() {
  const c = document.getElementById("content");
  // Only render if tab content marker doesn't match current tab
  if (c.dataset.renderedTab !== CURRENT_TAB) {
    renderTab();
    c.dataset.renderedTab = CURRENT_TAB;
  } else if (CURRENT_TAB === "all" || ["running","ok","error","pending"].includes(CURRENT_TAB)) {
    // Light update: just refresh statuses without rebuilding the whole grid
    patchWorkflowCards();
    // Refresh group counts
    DATA.groups.forEach(g => {
      const grpEl = document.querySelector(`.grp[data-grp="${cssEscape(g.name)}"] .grp-stats`);
      if (grpEl) {
        grpEl.textContent = `${g.ok}/${g.workflows.length} ok · ${g.error} err · ${g.pending} ○`;
      }
    });
  }
}
async function renderTab() {
  const c = document.getElementById("content");
  if (CURRENT_TAB === "submit")  { c.innerHTML = renderSubmit(); setTimeout(updateWfList, 0); return; }
  if (CURRENT_TAB === "commands"){
    c.innerHTML = '<div class="empty">Loading…</div>';
    c.innerHTML = await renderCommands();
    setTimeout(initBundleSlider, 0);
    return;
  }
  c.innerHTML = renderGroups(DATA?.groups || [], CURRENT_TAB);
}

// ── Bundle slider with live preview ────────────────────────────────────
let _previewTimer = null;
async function fetchPreview(budget) {
  try {
    return await apiGet(`/api/preview?budget=${budget}`);
  } catch (e) {
    return { error: e.message };
  }
}
function initBundleSlider() {
  const slider = document.getElementById("budgetSlider");
  if (!slider) return;
  const onSlide = () => {
    const v = +slider.value;
    document.getElementById("budgetVal").textContent = v + " GB";
    clearTimeout(_previewTimer);
    _previewTimer = setTimeout(() => updatePreview(v), 250);
  };
  slider.oninput = onSlide;
  onSlide();
}
async function updatePreview(budget) {
  const target = document.getElementById("previewPanel");
  if (!target) return;
  target.innerHTML = '<div class="empty" style="padding:1rem">Computing…</div>';
  const p = await fetchPreview(budget);
  if (p.error) {
    target.innerHTML = `<div class="empty" style="padding:1rem;color:var(--err)">${escHTML(p.error)}</div>`;
    return;
  }
  const diffAdded = p.added_count > 0
    ? `<span style="color:var(--ok)">+${p.added_count} models (+${p.added_size_gb} GB)</span>` : "";
  const diffRemoved = p.removed_count > 0
    ? `<span style="color:var(--err)">−${p.removed_count} models</span>` : "";
  target.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.5rem;margin-bottom:.8rem">
      <div class="detail-item"><div class="l">Selection</div><div class="v">${p.selection_count} models</div></div>
      <div class="detail-item"><div class="l">Total size</div><div class="v">${p.selection_size_gb} GB</div></div>
      <div class="detail-item"><div class="l">Diff (vs current)</div><div class="v" style="font-size:.78rem">${diffAdded || ""}${diffAdded&&diffRemoved?" · ":""}${diffRemoved || (diffAdded?"":"no change")}</div></div>
      <div class="detail-item"><div class="l">Families</div><div class="v">${p.by_family.length}</div></div>
    </div>
    <div style="max-height:280px;overflow:auto;background:var(--bg-1);border:1px solid var(--border);border-radius:6px;padding:.4rem .6rem">
      <table style="width:100%;font-size:.78rem;border-collapse:collapse">
        <thead><tr style="text-align:left;color:var(--text-dim);border-bottom:1px solid var(--border)">
          <th style="padding:.3rem 0">Family</th><th>#</th><th style="text-align:right;padding-right:.3rem">Size</th>
        </tr></thead>
        <tbody>
          ${p.by_family.map(f => `
            <tr style="border-bottom:1px solid rgba(42,42,58,.5)">
              <td style="padding:.3rem 0;font-family:monospace">${escHTML(f.family)}</td>
              <td>${f.count}</td>
              <td style="text-align:right">${f.size_gb} GB</td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>
    <button onclick="applyBudget(${budget})" style="margin-top:.8rem">✨ Apply this budget (build + download + cleanup)</button>
  `;
}
async function applyBudget(budget) {
  if (!confirm(`Lancer apply_changes avec budget=${budget} GB ?\nCela va rebuild le manifest, télécharger les nouveaux modèles, et supprimer les obsolètes.`)) return;
  await runCommandById("apply_changes", { budget });
}
async function runCommandById(cid, params) {
  try {
    const res = await apiPost("/api/command", { id: cid, params });
    if (res.error) throw new Error(res.error);
    toast(`▶ ${res.label} (${res.id})`, "ok");
  } catch (e) { toast("Error: " + e.message, "err"); }
}
document.querySelectorAll(".tab").forEach(t => {
  t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    CURRENT_TAB = t.dataset.tab; renderTab();
  };
});
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA") {
    e.preventDefault();
    const s = prompt("Filter workflows:", SEARCH);
    if (s !== null) { SEARCH = s; renderTab(); }
  }
});

if (!TOKEN) promptForToken(); else refresh();
setInterval(refresh, 4000);
</script>
