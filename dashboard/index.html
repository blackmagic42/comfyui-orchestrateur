<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ComfyUI Orchestrator</title>
<style>
  :root {
    /* Neutral zinc/slate palette — single subdued accent for primary actions. */
    --bg-0: #09090b;
    --bg-1: #111114;
    --bg-2: #16161a;
    --bg-3: #1c1c22;
    --border: #26262d;
    --border-strong: #353540;
    --text: #e5e5ea;
    --text-dim: #9a9aa6;
    --text-muted: #62626d;
    --accent: #4f7cff;        /* sober blue */
    --accent-hover: #6a91ff;
    --ok: #22c55e;
    --err: #ef4444;
    --warn: #eab308;
    --running: #4f7cff;
    --pending: #62626d;
    --radius: 6px;
    --radius-lg: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg-0);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
    font-feature-settings: "cv11", "ss01";
    min-height: 100vh;
    line-height: 1.45;
  }
  body { padding: 1.25rem 1.5rem; max-width: 1400px; margin: 0 auto; }

  /* ── Header ────────────────────────────────────────────────────────── */
  header {
    display: flex; align-items: baseline; gap: 1rem;
    padding-bottom: 1rem; margin-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 1.05rem; font-weight: 600; letter-spacing: -0.01em;
  }
  header .version {
    font-size: 0.7rem; color: var(--text-muted);
    font-family: ui-monospace, "SF Mono", monospace;
  }
  header .status {
    margin-left: auto; font-size: 0.78rem; color: var(--text-dim);
    display: flex; align-items: center; gap: 0.4rem;
  }
  header .status::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
  }
  header .status.connected::before { background: var(--ok); }
  header .status.disconnected::before { background: var(--err); }

  /* ── Setup banner (first-run hint) ──────────────────────────────────── */
  .banner {
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 0.85rem 1rem;
    margin-bottom: 1.25rem;
    display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
  }
  .banner h3 {
    font-size: 0.85rem; font-weight: 600; margin-bottom: 0.15rem;
  }
  .banner .hints {
    font-size: 0.78rem; color: var(--text-dim); line-height: 1.5;
  }
  .banner .hints ul { margin: 0.2rem 0 0 1.1rem; padding: 0; }

  /* ── Stats ─────────────────────────────────────────────────────────── */
  .stats {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
    gap: 0.5rem; margin-bottom: 1.25rem;
  }
  .stat {
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 0.6rem 0.8rem;
  }
  .stat .v {
    font-size: 1.4rem; font-weight: 600; line-height: 1.1;
    letter-spacing: -0.02em; font-variant-numeric: tabular-nums;
  }
  .stat .l {
    font-size: 0.66rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-top: 0.15rem; font-weight: 500;
  }
  .stat.ok .v { color: var(--ok); }
  .stat.err .v { color: var(--err); }
  .stat.warn .v { color: var(--warn); }
  .stat.run .v { color: var(--running); }

  /* ── Tabs ──────────────────────────────────────────────────────────── */
  .tabs {
    display: flex; gap: 0; margin-bottom: 1rem; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    background: transparent; border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-dim);
    padding: 0.55rem 0.9rem;
    cursor: pointer;
    font-family: inherit; font-size: 0.82rem;
    transition: color 0.12s, border-color 0.12s;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* ── Panel ─────────────────────────────────────────────────────────── */
  .panel { background: transparent; padding: 0; }
  .panel h2 {
    font-size: 0.9rem; font-weight: 600; margin-bottom: 0.8rem;
    display: flex; align-items: baseline; gap: 0.5rem;
  }
  .panel h2 .count {
    color: var(--text-muted); font-weight: 400;
    font-size: 0.78rem;
  }

  /* ── Forms / inputs / buttons ──────────────────────────────────────── */
  input, select, textarea {
    background: var(--bg-1); border: 1px solid var(--border);
    color: var(--text); padding: 0.42rem 0.7rem;
    border-radius: var(--radius); font-family: inherit; font-size: 0.82rem;
    transition: border-color 0.12s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent); outline: none;
  }
  button {
    background: var(--accent); border: 1px solid var(--accent); color: #fff;
    padding: 0.42rem 0.85rem; border-radius: var(--radius);
    cursor: pointer; font-family: inherit; font-size: 0.82rem;
    font-weight: 500;
    transition: background-color 0.12s, border-color 0.12s;
  }
  button:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost {
    background: transparent; border-color: var(--border-strong);
    color: var(--text);
  }
  button.ghost:hover:not(:disabled) {
    background: var(--bg-2); border-color: var(--text-muted);
  }
  button.danger {
    background: transparent; border-color: var(--err); color: var(--err);
  }
  button.danger:hover:not(:disabled) {
    background: var(--err); color: #fff;
  }
  button.sm { padding: 0.25rem 0.55rem; font-size: 0.75rem; }

  /* ── Group / cards (workflow grid) ─────────────────────────────────── */
  .grp {
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: var(--radius-lg); margin-bottom: 0.5rem; overflow: hidden;
  }
  .grp-head {
    padding: 0.55rem 0.85rem; cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 0.6rem;
    border-bottom: 1px solid transparent;
  }
  .grp-head:hover { background: var(--bg-2); }
  .grp.collapsed .grp-head { border-bottom-color: transparent; }
  .grp-name { font-weight: 500; flex: 1; font-size: 0.85rem; }
  .grp-stats {
    font-size: 0.7rem; color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .grp-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.4rem; padding: 0.4rem 0.6rem 0.55rem;
    border-top: 1px solid var(--border);
  }
  .grp.collapsed .grp-grid { display: none; }

  .card {
    padding: 0.5rem 0.6rem; background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    position: relative; cursor: pointer;
    transition: border-color 0.12s, background-color 0.12s;
  }
  .card:hover { border-color: var(--text-muted); background: var(--bg-3); }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0.4rem; bottom: 0.4rem;
    width: 2px; border-radius: 0 1px 1px 0; background: var(--pending);
  }
  .card.ok::before { background: var(--ok); }
  .card.error::before { background: var(--err); }
  .card.timeout::before { background: var(--warn); }
  .card.running::before { background: var(--running); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: 0.35; } }

  .card-name {
    font-size: 0.78rem; font-weight: 500;
    word-break: break-word; padding-left: 0.5rem;
  }
  .card-meta {
    font-size: 0.66rem; color: var(--text-muted);
    margin-top: 0.2rem; padding-left: 0.5rem;
    display: flex; gap: 0.3rem; flex-wrap: wrap;
  }
  .tag {
    background: var(--bg-1); border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 0.05rem 0.35rem; border-radius: 3px;
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.65rem;
  }
  .tag.ok { color: var(--ok); border-color: rgba(34,197,94,0.3); }
  .tag.run { color: var(--running); border-color: rgba(79,124,255,0.3); }
  .err-msg {
    font-size: 0.66rem; color: var(--err); margin-top: 0.25rem;
    padding-left: 0.5rem; max-height: 2.4em; overflow: hidden; line-height: 1.2;
  }

  /* ── Modal ─────────────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(9, 9, 11, 0.78); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 1rem;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--bg-1); border: 1px solid var(--border-strong);
    border-radius: var(--radius-lg);
    width: 100%; max-width: 980px; max-height: 90vh;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 16px 40px rgba(0,0,0,0.6);
  }
  .modal-head {
    padding: 0.85rem 1.1rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0.8rem;
  }
  .modal-head h2 { flex: 1; font-size: 0.95rem; font-weight: 600; }
  .modal-body { flex: 1; overflow-y: auto; padding: 0.9rem 1.1rem; }
  .modal-body::-webkit-scrollbar { width: 8px; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }

  .detail-section { margin-bottom: 1.1rem; }
  .detail-section h3 {
    font-size: 0.7rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 0.45rem; font-weight: 600;
  }
  .detail-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 0.45rem;
  }
  .detail-item {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 0.45rem 0.65rem;
  }
  .detail-item .l {
    font-size: 0.62rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .detail-item .v {
    font-size: 0.82rem; font-weight: 500; margin-top: 0.15rem;
    word-break: break-word;
  }

  pre {
    background: var(--bg-2); border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.65rem 0.85rem;
    font-family: ui-monospace, "SF Mono", "JetBrains Mono", monospace;
    font-size: 0.72rem; line-height: 1.5;
    max-height: 400px; overflow: auto;
    color: var(--text); white-space: pre-wrap; word-break: break-all;
  }
  pre.compact { max-height: 180px; }

  .widget-row {
    display: grid; grid-template-columns: auto 1fr; gap: 0.5rem;
    padding: 0.4rem 0.6rem; background: var(--bg-2);
    border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 0.3rem; font-size: 0.78rem;
  }
  .widget-row .k {
    font-family: ui-monospace, "SF Mono", monospace;
    color: var(--accent); white-space: nowrap;
  }
  .widget-row .v { color: var(--text); word-break: break-all; }

  /* ── Submit form ───────────────────────────────────────────────────── */
  .submit-form {
    display: grid; grid-template-columns: 1fr 2fr auto; gap: 0.5rem;
    margin-bottom: 0.7rem;
  }
  .submit-form select, .submit-form input { width: 100%; }

  /* ── Commands panel ────────────────────────────────────────────────── */
  .section-head {
    margin: 1.25rem 0 0.5rem;
    font-size: 0.72rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 600;
  }
  .section-head:first-child { margin-top: 0; }

  .cmd-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.5rem;
  }
  .cmd-card {
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 0.8rem 0.95rem;
    transition: border-color 0.12s;
  }
  .cmd-card:hover { border-color: var(--border-strong); }
  .cmd-card h3 {
    font-size: 0.88rem; font-weight: 600; margin-bottom: 0.25rem;
  }
  .cmd-card .desc {
    font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.55rem;
    line-height: 1.4;
  }
  .cmd-params { display: grid; gap: 0.35rem; margin-bottom: 0.55rem; }
  .cmd-params label {
    display: flex; flex-direction: column; gap: 0.15rem;
    font-size: 0.68rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .cmd-params input { padding: 0.3rem 0.55rem; font-size: 0.8rem; }
  .cmd-card-foot {
    display: flex; align-items: center; justify-content: space-between;
    gap: 0.5rem;
  }
  .cmd-status {
    font-size: 0.72rem; color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .cmd-status.running { color: var(--running); }
  .cmd-status.ok { color: var(--ok); }
  .cmd-status.error, .cmd-status.cancelled { color: var(--err); }

  /* Bundle panel */
  .bundle-panel {
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 0.95rem;
  }
  .bundle-presets {
    display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.85rem;
  }
  .bundle-presets button {
    flex: 1; min-width: 95px;
  }
  .slider-row {
    display: flex; align-items: center; gap: 0.7rem;
    margin-bottom: 0.85rem;
  }
  .slider-row label {
    color: var(--text-muted); font-size: 0.78rem;
    text-transform: uppercase; letter-spacing: 0.04em;
    font-weight: 500;
  }
  #budgetSlider { flex: 1; accent-color: var(--accent); }
  #budgetVal {
    font-family: ui-monospace, "SF Mono", monospace;
    color: var(--text); font-weight: 600;
    font-variant-numeric: tabular-nums;
    min-width: 80px; text-align: right;
  }

  /* Active runs list */
  .run-row {
    background: var(--bg-1); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 0.5rem 0.7rem;
    margin-bottom: 0.35rem;
    display: flex; align-items: center; gap: 0.6rem;
  }
  .run-row .run-id {
    font-family: ui-monospace, "SF Mono", monospace;
    font-size: 0.74rem; color: var(--text-dim);
    flex: 1; min-width: 0; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }

  .empty {
    padding: 2rem 1rem; text-align: center; color: var(--text-muted);
    font-size: 0.85rem;
  }

  /* ── Toasts ────────────────────────────────────────────────────────── */
  .toasts {
    position: fixed; bottom: 1rem; right: 1rem; z-index: 200;
    display: flex; flex-direction: column; gap: 0.4rem;
  }
  .toast {
    background: var(--bg-2); border: 1px solid var(--border-strong);
    border-left: 2px solid var(--accent);
    padding: 0.55rem 0.85rem; border-radius: var(--radius);
    min-width: 280px; max-width: 380px;
    font-size: 0.82rem; line-height: 1.4;
    animation: slidein 0.2s ease-out;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
  }
  .toast.ok { border-left-color: var(--ok); }
  .toast.err { border-left-color: var(--err); }
  @keyframes slidein {
    from { transform: translateY(8px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>
</head>
<body>

<header>
  <h1>ComfyUI Orchestrator</h1>
  <span class="version">v2.2</span>
  <div class="status" id="authStatus">connecting</div>
</header>

<div class="banner" id="setupBanner" style="display:none">
  <div style="flex:1; min-width:240px">
    <h3>First-run setup</h3>
    <div id="setupHints" class="hints"></div>
  </div>
  <div style="display:flex; gap:0.4rem; flex-wrap:wrap">
    <button onclick="quickCommand('bootstrap_install')" id="btnBootstrap">Install ComfyUI</button>
    <button onclick="goToCommands()" class="ghost">View all commands</button>
  </div>
</div>

<div class="stats" id="stats"></div>

<div class="tabs">
  <button class="tab active" data-tab="all">All</button>
  <button class="tab" data-tab="running">Running</button>
  <button class="tab" data-tab="ok">Success</button>
  <button class="tab" data-tab="error">Errors</button>
  <button class="tab" data-tab="pending">Untested</button>
  <button class="tab" data-tab="submit">Submit job</button>
  <button class="tab" data-tab="commands">Commands</button>
</div>

<div class="panel" id="content">
  <div class="empty">Loading…</div>
</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">Workflow</h2>
      <button class="ghost sm" onclick="closeModal()">Close</button>
    </div>
    <div class="modal-body" id="modalBody">Loading…</div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
const API = window.location.origin;
let TOKEN = window.ORCHESTRATOR_TOKEN || localStorage.getItem("orchestrator_token") || "";
if (window.ORCHESTRATOR_TOKEN) {
  try { localStorage.setItem("orchestrator_token", window.ORCHESTRATOR_TOKEN); } catch {}
}
let DATA = null;
let COMMANDS_DATA = null;
let CURRENT_TAB = "all";
let SEARCH = "";

function authHeaders() { return TOKEN ? { "Authorization": "Bearer " + TOKEN } : {}; }

async function apiGet(path) {
  const r = await fetch(API + path, { headers: authHeaders() });
  if (r.status === 401) {
    document.getElementById("authStatus").textContent = "auth required";
    document.getElementById("authStatus").className = "status disconnected";
    promptForToken(); throw new Error("auth required");
  }
  return await r.json();
}
async function apiPost(path, body) {
  const r = await fetch(API + path, {
    method: "POST",
    headers: { "Content-Type": "application/json", ...authHeaders() },
    body: body ? JSON.stringify(body) : undefined,
  });
  return await r.json();
}
function promptForToken() {
  const t = prompt("Bearer token:");
  if (t) { TOKEN = t; localStorage.setItem("orchestrator_token", t); refresh(); }
}
function toast(msg, kind = "info") {
  const t = document.createElement("div");
  t.className = "toast " + kind; t.textContent = msg;
  document.getElementById("toasts").appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; t.style.transition = "all .25s"; setTimeout(() => t.remove(), 250); }, 4000);
}
function escHTML(s) {
  return String(s||"").replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;",
  })[c]);
}

// ── Stats / instances ──────────────────────────────────────────────────
function renderStats(s) {
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="v">${s.total}</div><div class="l">Total</div></div>
    <div class="stat ok"><div class="v">${s.ok}</div><div class="l">Success</div></div>
    <div class="stat err"><div class="v">${s.error}</div><div class="l">Errors</div></div>
    <div class="stat warn"><div class="v">${s.timeout}</div><div class="l">Timeout</div></div>
    <div class="stat run"><div class="v">${s.running||0}</div><div class="l">Running</div></div>
    <div class="stat"><div class="v">${s.pending}</div><div class="l">Untested</div></div>
  `;
}
function renderInstances(insts) {
  const status = document.getElementById("authStatus");
  if (!insts || !insts.length) {
    status.textContent = "no instance";
    status.className = "status disconnected";
  } else {
    const load = insts.reduce((a, i) => a + i.load, 0);
    status.textContent = `${insts.length} instance${insts.length>1?"s":""} · load ${load}`;
    status.className = "status connected";
  }
}

// ── Workflow grid ───────────────────────────────────────────────────────
function renderGroups(groups, filter = "all") {
  const f = SEARCH.toLowerCase();
  const visible = groups.map(g => {
    const wfs = g.workflows.filter(w => {
      if (filter !== "all" && w.status !== filter) return false;
      if (f && !w.tid.toLowerCase().includes(f) && !g.name.toLowerCase().includes(f)) return false;
      return true;
    });
    return { ...g, _visible: wfs };
  }).filter(g => g._visible.length > 0);

  if (!visible.length) return `<div class="empty">No workflows match.</div>`;

  return visible.map(g => `
    <div class="grp" data-grp="${escHTML(g.name)}">
      <div class="grp-head" onclick="this.parentElement.classList.toggle('collapsed')">
        <div class="grp-name">${escHTML(g.name)}</div>
        <div class="grp-stats">${g.ok}/${g.workflows.length} ok · ${g.error} err · ${g.pending} untested</div>
      </div>
      <div class="grp-grid">
        ${g._visible.map(w => `
          <div class="card ${w.status}" data-tid="${escHTML(w.tid)}" onclick="showDetails('${escHTML(w.tid)}')">
            <div class="card-name">${escHTML(w.tid)}</div>
            <div class="card-meta">
              <span class="tag">ph${w.phase || "?"}</span>
              ${w.duration ? `<span class="tag">${w.duration}s</span>` : ""}
              ${w.instance ? `<span class="tag">${escHTML((w.instance||"").replace("http://","").slice(0,18))}</span>` : ""}
              ${w.status === "running" ? '<span class="tag run">running</span>' : ""}
              ${w.status === "ok" ? '<span class="tag ok">ok</span>' : ""}
            </div>
            ${w.error ? `<div class="err-msg" title="${escHTML(w.error)}">${escHTML(w.error.slice(0, 100))}</div>` : ""}
          </div>
        `).join("")}
      </div>
    </div>`).join("");
}

// ── Submit Job ──────────────────────────────────────────────────────────
function renderSubmit() {
  if (!DATA) return "Loading…";
  return `
    <h2>Submit a job</h2>
    <p style="color:var(--text-dim);font-size:.8rem;margin-bottom:.85rem">
      Pick a workflow to run on an available instance.
    </p>
    <div class="submit-form">
      <select id="catSelect" onchange="updateWfList()">
        <option value="">All categories</option>
        ${[...new Set(DATA.groups.map(g => g.name))].sort().map(c =>
          `<option value="${escHTML(c)}">${escHTML(c)}</option>`).join("")}
      </select>
      <select id="wfSelect"></select>
      <button onclick="submitJob()" id="submitBtn">Run</button>
    </div>
    <textarea id="promptInput" rows="3" placeholder="Override prompt (optional)…"
      style="width:100%;resize:vertical;margin-top:.5rem"></textarea>
  `;
}
function updateWfList() {
  const cat = document.getElementById("catSelect").value;
  const sel = document.getElementById("wfSelect");
  const items = DATA.groups.filter(g => !cat || g.name === cat)
    .flatMap(g => g.workflows.map(w => ({ ...w, cat: g.name })))
    .sort((a, b) => a.tid.localeCompare(b.tid));
  sel.innerHTML = items.map(w =>
    `<option value="${escHTML(w.tid)}">${escHTML(w.cat)} · ${escHTML(w.tid)} (${w.status})</option>`).join("");
}
async function submitJob() {
  const tid = document.getElementById("wfSelect").value;
  const prompt = document.getElementById("promptInput").value;
  if (!tid) return;
  document.getElementById("submitBtn").disabled = true;
  try {
    const res = await apiPost("/api/job", { template_id: tid, prompt });
    if (res.error) throw new Error(res.error);
    toast(`Submitted: ${tid} → ${res.instance}`, "ok");
    setTimeout(refresh, 500);
  } catch (e) { toast("Error: " + e.message, "err"); }
  finally { document.getElementById("submitBtn").disabled = false; }
}

// ── Commands panel ──────────────────────────────────────────────────────
const CMD_LABELS = {
  bootstrap_install: "Install ComfyUI",
  apply_changes:     "Apply changes",
  launch_comfyui:    "Launch instance",
  catalog_build:     "Build catalog",
  catalog_sync:      "Sync templates",
  catalog_download:  "Download models",
  catalog_status:    "Catalog status",
  catalog_cleanup:   "Cleanup obsolete",
  classify:          "Classify workflows",
  export_api:        "Export API workflows",
  starters:          "Generate starters",
  gated_check:       "Check gated models",
  install_workflows: "Install workflow files",
  bundle_minimal:    "Minimal preset",
  bundle_image:      "Image preset",
  bundle_standard:   "Standard preset",
  bundle_full:       "Full preset",
};
function cleanLabel(cid, fallback) {
  return CMD_LABELS[cid] || (fallback || cid).replace(/^[^a-zA-Z0-9]+/, "").trim();
}

function renderCmdCard(cid, c) {
  return `
    <div class="cmd-card" data-cid="${cid}">
      <h3>${escHTML(cleanLabel(cid, c.label))}</h3>
      <div class="desc">${escHTML(c.description||'')}</div>
      ${c.params && c.params.length ? `
        <div class="cmd-params">
          ${c.params.map(p => `
            <label>
              ${escHTML(p.label||p.name)}
              <input type="${p.type==='int'?'number':'text'}" name="${p.name}" value="${p.default}">
            </label>`).join("")}
        </div>` : ""}
      <div class="cmd-card-foot">
        <span class="cmd-status" data-status></span>
        <button onclick="runCommand('${cid}', this)" class="sm">Run</button>
      </div>
    </div>`;
}

async function renderCommands() {
  COMMANDS_DATA = await apiGet("/api/commands");
  const cmds = COMMANDS_DATA.available;
  const running = COMMANDS_DATA.running;

  const SECTIONS = [
    { name: "Setup",   ids: ["bootstrap_install", "apply_changes", "launch_comfyui"] },
    { name: "Catalog", ids: ["catalog_build", "catalog_sync", "catalog_download", "catalog_status", "catalog_cleanup"] },
    { name: "Tools",   ids: ["classify", "export_api", "starters", "gated_check", "install_workflows"] },
  ];
  const used = new Set();

  const bundleIds = ["bundle_minimal", "bundle_image", "bundle_standard", "bundle_full"];
  bundleIds.forEach(id => { if (cmds[id]) used.add(id); });

  const BUNDLE_PRESETS = [
    { name: "Minimal",  budget: 250,  desc: "text-to-image essentials" },
    { name: "Image",    budget: 400,  desc: "Flux + Qwen-Edit + ControlNet" },
    { name: "Standard", budget: 700,  desc: "image + video latest" },
    { name: "Full",     budget: 1500, desc: "everything" },
  ];

  const bundlesHtml = `
    <div class="section-head">Model budget</div>
    <div class="bundle-panel">
      <div class="bundle-presets">
        ${BUNDLE_PRESETS.map(b => `
          <button class="ghost"
            onclick="document.getElementById('budgetSlider').value=${b.budget};document.getElementById('budgetSlider').dispatchEvent(new Event('input'))"
            title="${escHTML(b.desc)}">
            ${b.name} · ${b.budget} GB
          </button>
        `).join("")}
      </div>
      <div class="slider-row">
        <label>Budget</label>
        <input id="budgetSlider" type="range" min="100" max="2000" step="50" value="700">
        <span id="budgetVal">700 GB</span>
      </div>
      <div id="previewPanel"><div class="empty" style="padding:.85rem">Move slider to preview…</div></div>
    </div>`;

  const sectionsHtml = SECTIONS.map(sec => {
    const items = sec.ids.filter(id => cmds[id]).map(id => { used.add(id); return [id, cmds[id]]; });
    if (!items.length) return "";
    return `
      <div class="section-head">${escHTML(sec.name)}</div>
      <div class="cmd-grid">
        ${items.map(([cid, c]) => renderCmdCard(cid, c)).join("")}
      </div>`;
  }).join("");

  const leftover = Object.entries(cmds).filter(([cid]) => !used.has(cid));
  const leftoverHtml = leftover.length ? `
    <div class="section-head">Other</div>
    <div class="cmd-grid">
      ${leftover.map(([cid, c]) => renderCmdCard(cid, c)).join("")}
    </div>` : "";

  const runsHtml = `
    <div class="section-head">Active &amp; recent runs</div>
    <div id="cmdActiveList">
      ${Object.entries(running||{}).map(([rid, info]) => {
        const isRunning = info.status === "running";
        const statusText = info.status || "?";
        return `
          <div class="run-row">
            <span class="cmd-status ${info.status}">${escHTML(statusText)}</span>
            <span class="run-id" title="${escHTML(rid)}">${escHTML(rid)}</span>
            ${isRunning ? `<button class="danger sm" onclick="cancelRun('${rid}', this)">Cancel</button>` : ""}
            <button class="ghost sm" onclick="showCommandLog('${rid}')">Log</button>
          </div>
        `;
      }).join("") || '<div class="empty">No commands ran yet.</div>'}
    </div>`;

  return `
    <h2>Commands <span class="count">— run on the local host</span></h2>
    ${bundlesHtml}
    ${sectionsHtml}
    ${leftoverHtml}
    ${runsHtml}
  `;
}
async function runCommand(cid, btn) {
  btn.disabled = true;
  const card = btn.closest(".cmd-card");
  const params = {};
  card.querySelectorAll("input[name]").forEach(i => { params[i.name] = i.value; });
  try {
    const res = await apiPost("/api/command", { id: cid, params });
    if (res.error) throw new Error(res.error);
    toast(`Started: ${res.label || cid} (${res.id})`, "ok");
    card.querySelector("[data-status]").textContent = "running";
    card.querySelector("[data-status]").className = "cmd-status running";
    setTimeout(() => { if (CURRENT_TAB === "commands") renderTab(); }, 500);
  } catch (e) { toast("Error: " + e.message, "err"); }
  finally { setTimeout(() => btn.disabled = false, 800); }
}
async function cancelRun(rid, btn) {
  btn.disabled = true;
  btn.textContent = "Cancelling…";
  try {
    const res = await apiPost(`/api/command/cancel/${encodeURIComponent(rid)}`);
    if (res.error) throw new Error(res.error);
    toast(`Cancelled ${rid}`, "ok");
    setTimeout(() => { if (CURRENT_TAB === "commands") renderTab(); }, 250);
  } catch (e) {
    toast("Cancel failed: " + e.message, "err");
    btn.disabled = false; btn.textContent = "Cancel";
  }
}
async function showCommandLog(rid) {
  const data = await apiGet(`/api/command/log/${encodeURIComponent(rid)}`);
  const isRunning = data.status === "running";
  const body = `
    <div class="detail-section">
      <h3>Run info</h3>
      <div class="detail-grid">
        <div class="detail-item"><div class="l">ID</div><div class="v">${escHTML(rid)}</div></div>
        <div class="detail-item"><div class="l">Status</div><div class="v">${escHTML(data.status||'?')}</div></div>
        <div class="detail-item"><div class="l">PID</div><div class="v">${data.pid||'—'}</div></div>
        <div class="detail-item"><div class="l">Return code</div><div class="v">${data.return_code===undefined?'—':data.return_code}</div></div>
      </div>
      ${isRunning ? `<div style="margin-top:.6rem"><button class="danger sm" onclick="cancelRunFromModal('${escHTML(rid)}')">Cancel run</button></div>` : ""}
    </div>
    <div class="detail-section">
      <h3>Command</h3>
      <pre class="compact">${escHTML(data.cmd||'')}</pre>
    </div>
    <div class="detail-section">
      <h3>Log tail (last 8 KB)</h3>
      <pre id="logTail">${escHTML(data.tail||'(empty)')}</pre>
    </div>`;
  openModal(`Run — ${rid}`, body);
}
async function cancelRunFromModal(rid) {
  try {
    const res = await apiPost(`/api/command/cancel/${encodeURIComponent(rid)}`);
    if (res.error) throw new Error(res.error);
    toast(`Cancelled ${rid}`, "ok");
    closeModal();
    setTimeout(() => { if (CURRENT_TAB === "commands") renderTab(); }, 250);
  } catch (e) { toast("Cancel failed: " + e.message, "err"); }
}

// ── Workflow details modal ─────────────────────────────────────────────
async function showDetails(tid) {
  openModal(escHTML(tid), '<div class="empty">Loading…</div>');
  try {
    const w = await apiGet(`/api/workflow/${encodeURIComponent(tid)}`);
    if (w.error) {
      document.getElementById("modalBody").innerHTML = `<div class="empty">${escHTML(w.error)}</div>`;
      return;
    }
    const body = `
      <div class="detail-section">
        <h3>Classification</h3>
        <div class="detail-grid">
          <div class="detail-item"><div class="l">Phase</div><div class="v">${w.phase||'?'}</div></div>
          <div class="detail-item"><div class="l">Category</div><div class="v">${escHTML(w.category||'?')}</div></div>
          <div class="detail-item"><div class="l">Inputs</div><div class="v">${(w.inputs||[]).join(', ')||'—'}</div></div>
          <div class="detail-item"><div class="l">Outputs</div><div class="v">${(w.outputs||[]).join(', ')||'—'}</div></div>
          <div class="detail-item"><div class="l">Nodes</div><div class="v">${w.node_count||'?'}</div></div>
          <div class="detail-item"><div class="l">Features</div><div class="v">${[
            w.has_lora?'LoRA':null, w.has_controlnet?'ControlNet':null, w.has_ipadapter?'IPAdapter':null
          ].filter(Boolean).join(', ')||'—'}</div></div>
        </div>
      </div>
      ${w.default_prompts && w.default_prompts.length ? `
        <div class="detail-section">
          <h3>Default prompts</h3>
          ${w.default_prompts.map(p => `<pre class="compact">${escHTML(p)}</pre>`).join("")}
        </div>` : ""}
      ${w.widgets_overview && w.widgets_overview.length ? `
        <div class="detail-section">
          <h3>Key widgets</h3>
          ${w.widgets_overview.map(o => `
            <div class="widget-row">
              <span class="k">[${o.node_id}] ${escHTML(o.type)}</span>
              <span class="v">${escHTML(JSON.stringify(o.widgets))}</span>
            </div>`).join("")}
        </div>` : ""}
      ${w.last_run && w.last_run.status ? `
        <div class="detail-section">
          <h3>Last run</h3>
          <div class="detail-grid">
            <div class="detail-item"><div class="l">Status</div><div class="v">${escHTML(w.last_run.status)}</div></div>
            <div class="detail-item"><div class="l">Duration</div><div class="v">${w.last_run.duration||'?'}s</div></div>
            <div class="detail-item"><div class="l">Instance</div><div class="v">${escHTML(w.last_run.instance||'?')}</div></div>
            <div class="detail-item"><div class="l">Last run at</div><div class="v">${escHTML((w.last_run.last_run||'').slice(0,19))}</div></div>
          </div>
          ${w.last_run.error ? `<pre class="compact" style="margin-top:.6rem;color:var(--err)">${escHTML(w.last_run.error)}</pre>` : ""}
          ${w.last_run.outputs && w.last_run.outputs.length ? `
            <div style="margin-top:.6rem">
              <h3 style="font-size:.7rem">Outputs</h3>
              ${w.last_run.outputs.map(o =>
                `<div style="font-family:ui-monospace,monospace;font-size:.72rem;color:var(--text-dim)">${escHTML(o.kind)}: ${escHTML(o.subfolder?o.subfolder+'/':'')}${escHTML(o.filename)}</div>`
              ).join("")}
            </div>` : ""}
        </div>` : ""}
      <div class="detail-section">
        <h3>API workflow JSON ${w.api_available ? '' : '(not exported)'}</h3>
        ${w.api_available ? `<pre>${escHTML(JSON.stringify(w.api_graph, null, 2))}</pre>` : '<div class="empty">Not yet exported. Run command: <code>export_api</code></div>'}
      </div>
      <div style="display:flex;gap:.4rem;margin-top:.85rem">
        <button onclick="quickRun('${escHTML(w.template_id)}')">Run on least-loaded</button>
        <button class="ghost" onclick="copyJSON('${escHTML(w.template_id)}')">Copy API JSON</button>
      </div>
    `;
    document.getElementById("modalBody").innerHTML = body;
    window._lastWf = w;
  } catch (e) {
    document.getElementById("modalBody").innerHTML = `<div class="empty">Error: ${escHTML(e.message)}</div>`;
  }
}
async function quickRun(tid) {
  try {
    const res = await apiPost("/api/job", { template_id: tid });
    if (res.error) throw new Error(res.error);
    toast(`${tid} → ${res.instance}`, "ok");
    closeModal(); setTimeout(refresh, 500);
  } catch (e) { toast("Error: " + e.message, "err"); }
}
function copyJSON(tid) {
  if (window._lastWf?.api_graph) {
    navigator.clipboard?.writeText(JSON.stringify(window._lastWf.api_graph, null, 2));
    toast("API JSON copied", "ok");
  }
}
function openModal(title, body) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = body;
  document.getElementById("modalOverlay").classList.remove("hidden");
}
function closeModal() { document.getElementById("modalOverlay").classList.add("hidden"); }
document.getElementById("modalOverlay").addEventListener("click", e => {
  if (e.target.id === "modalOverlay") closeModal();
});
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

// ── Tabs / refresh ─────────────────────────────────────────────────────
async function quickCommand(cid, params = {}) {
  try {
    const res = await apiPost("/api/command", { id: cid, params });
    if (res.error) throw new Error(res.error);
    toast(`Started: ${res.label || cid} (${res.id})`, "ok");
  } catch (e) { toast("Error: " + e.message, "err"); }
}

function goToCommands() {
  document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
  document.querySelector('[data-tab="commands"]').classList.add("active");
  CURRENT_TAB = "commands"; renderTab();
}

async function checkSetup() {
  try {
    const s = await apiGet("/api/setup");
    const banner = document.getElementById("setupBanner");
    const hints = document.getElementById("setupHints");
    const todos = [];
    if (!s.comfyui_installed) todos.push("ComfyUI is not installed");
    if (!s.manifest_built) todos.push("Catalog manifest not built (use the Standard preset)");
    if (!s.classes_built) todos.push("Workflows not classified");
    if (!s.api_workflows_exported) todos.push("Workflows not exported as API JSON");
    if (!s.comfyui_running && s.comfyui_installed) todos.push("ComfyUI installed but not running (auto-launch on next job)");

    if (todos.length === 0) {
      banner.style.display = "none";
    } else {
      banner.style.display = "flex";
      hints.innerHTML = `<ul>${todos.map(t => `<li>${escHTML(t)}</li>`).join("")}</ul>` +
        (s.manifest && s.manifest.budget_gb
          ? `<div style="margin-top:.4rem; font-size:.72rem; color:var(--text-muted)">Manifest: ${s.manifest.selection_count} models · ${s.manifest.selection_size_gb} GB · budget ${s.manifest.budget_gb} GB</div>`
          : "");
      const btn = document.getElementById("btnBootstrap");
      if (s.comfyui_installed) {
        btn.textContent = "Apply changes";
        btn.onclick = () => quickCommand("apply_changes", { budget: 700 });
      }
    }
  } catch (e) { /* swallow */ }
}

function userIsInteracting() {
  const a = document.activeElement;
  if (!a) return false;
  return a.tagName === "INPUT" || a.tagName === "TEXTAREA" || a.tagName === "SELECT";
}

async function refresh() {
  try {
    const newData = await apiGet("/api/dashboard");
    DATA = newData;
    renderStats(DATA.stats);
    renderInstances(DATA.instances);
    if (!userIsInteracting()) {
      smartRenderTab();
    } else {
      patchWorkflowCards();
    }
    checkSetup();
  } catch (e) {
    if (e.message !== "auth required") console.warn("Refresh failed:", e.message);
  }
}

function patchWorkflowCards() {
  if (!DATA) return;
  const allWfs = DATA.groups.flatMap(g => g.workflows);
  for (const w of allWfs) {
    document.querySelectorAll(`.card[data-tid="${cssEscape(w.tid)}"]`).forEach(card => {
      const cur = card.className.match(/card\s+(\w+)/)?.[1];
      if (cur !== w.status) card.className = "card " + w.status;
    });
  }
}
function cssEscape(s) { return String(s).replace(/(["\\])/g, "\\$1"); }

function smartRenderTab() {
  const c = document.getElementById("content");
  if (c.dataset.renderedTab !== CURRENT_TAB) {
    renderTab();
    c.dataset.renderedTab = CURRENT_TAB;
  } else if (CURRENT_TAB === "all" || ["running","ok","error","pending"].includes(CURRENT_TAB)) {
    patchWorkflowCards();
    DATA.groups.forEach(g => {
      const grpEl = document.querySelector(`.grp[data-grp="${cssEscape(g.name)}"] .grp-stats`);
      if (grpEl) {
        grpEl.textContent = `${g.ok}/${g.workflows.length} ok · ${g.error} err · ${g.pending} untested`;
      }
    });
  }
}
async function renderTab() {
  const c = document.getElementById("content");
  if (CURRENT_TAB === "submit")  { c.innerHTML = renderSubmit(); setTimeout(updateWfList, 0); return; }
  if (CURRENT_TAB === "commands"){
    c.innerHTML = '<div class="empty">Loading…</div>';
    c.innerHTML = await renderCommands();
    setTimeout(initBundleSlider, 0);
    return;
  }
  c.innerHTML = renderGroups(DATA?.groups || [], CURRENT_TAB);
}

// ── Bundle slider with live preview ────────────────────────────────────
let _previewTimer = null;
async function fetchPreview(budget) {
  try { return await apiGet(`/api/preview?budget=${budget}`); }
  catch (e) { return { error: e.message }; }
}
function initBundleSlider() {
  const slider = document.getElementById("budgetSlider");
  if (!slider) return;
  const onSlide = () => {
    const v = +slider.value;
    document.getElementById("budgetVal").textContent = v + " GB";
    clearTimeout(_previewTimer);
    _previewTimer = setTimeout(() => updatePreview(v), 250);
  };
  slider.oninput = onSlide;
  onSlide();
}
async function updatePreview(budget) {
  const target = document.getElementById("previewPanel");
  if (!target) return;
  target.innerHTML = '<div class="empty" style="padding:.85rem">Computing…</div>';
  const p = await fetchPreview(budget);
  if (p.error) {
    target.innerHTML = `<div class="empty" style="padding:.85rem;color:var(--err)">${escHTML(p.error)}</div>`;
    return;
  }
  const diffAdded = p.added_count > 0 ? `<span style="color:var(--ok)">+${p.added_count} models (+${p.added_size_gb} GB)</span>` : "";
  const diffRemoved = p.removed_count > 0 ? `<span style="color:var(--err)">−${p.removed_count} models</span>` : "";
  target.innerHTML = `
    <div class="detail-grid" style="margin-bottom:.7rem">
      <div class="detail-item"><div class="l">Selection</div><div class="v">${p.selection_count} models</div></div>
      <div class="detail-item"><div class="l">Total size</div><div class="v">${p.selection_size_gb} GB</div></div>
      <div class="detail-item"><div class="l">Diff vs current</div><div class="v" style="font-size:.78rem">${diffAdded || ""}${diffAdded&&diffRemoved?" · ":""}${diffRemoved || (diffAdded?"":"no change")}</div></div>
      <div class="detail-item"><div class="l">Families</div><div class="v">${p.by_family.length}</div></div>
    </div>
    <div style="max-height:280px;overflow:auto;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);padding:.4rem .6rem">
      <table style="width:100%;font-size:.76rem;border-collapse:collapse">
        <thead><tr style="text-align:left;color:var(--text-muted);border-bottom:1px solid var(--border)">
          <th style="padding:.3rem 0">Family</th><th>#</th><th style="text-align:right;padding-right:.3rem">Size</th>
        </tr></thead>
        <tbody>
          ${p.by_family.map(f => `
            <tr style="border-bottom:1px solid rgba(38,38,45,.5)">
              <td style="padding:.3rem 0;font-family:ui-monospace,monospace">${escHTML(f.family)}</td>
              <td>${f.count}</td>
              <td style="text-align:right;font-variant-numeric:tabular-nums">${f.size_gb} GB</td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>
    <div style="margin-top:.85rem;display:flex;gap:.4rem">
      <button onclick="applyBudget(${budget})">Apply this budget</button>
      <span style="font-size:.72rem;color:var(--text-muted);align-self:center">— builds the manifest, downloads missing, removes obsolete</span>
    </div>
  `;
}
async function applyBudget(budget) {
  if (!confirm(`Apply budget = ${budget} GB ?\n\nThis will rebuild the manifest, download new models, and remove obsolete ones. You can cancel from the Active runs panel.`)) return;
  await runCommandById("apply_changes", { budget });
}
async function runCommandById(cid, params) {
  try {
    const res = await apiPost("/api/command", { id: cid, params });
    if (res.error) throw new Error(res.error);
    toast(`Started: ${res.label || cid} (${res.id})`, "ok");
    if (CURRENT_TAB === "commands") setTimeout(renderTab, 250);
  } catch (e) { toast("Error: " + e.message, "err"); }
}
document.querySelectorAll(".tab").forEach(t => {
  t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    CURRENT_TAB = t.dataset.tab; renderTab();
  };
});
document.addEventListener("keydown", e => {
  if (e.key === "/" && document.activeElement.tagName !== "INPUT" && document.activeElement.tagName !== "TEXTAREA") {
    e.preventDefault();
    const s = prompt("Filter workflows:", SEARCH);
    if (s !== null) { SEARCH = s; renderTab(); }
  }
});

if (!TOKEN) promptForToken(); else refresh();
setInterval(refresh, 4000);
</script>
